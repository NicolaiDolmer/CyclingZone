name: UCI Rankings Sync

on:
  schedule:
    - cron: '0 6 * * 1'   # Hver mandag kl. 06:00 UTC
  workflow_dispatch:        # Manuel kørsel fra GitHub Actions-siden

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scripts/requirements_uci.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements_uci.txt

      - name: Run UCI scraper
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.UCI_GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.UCI_GOOGLE_SHEET_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/uci_scraper.py

      - name: Upload log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: uci-scraper-log
          path: uci_scraper_error.log
          if-no-files-found: ignore
