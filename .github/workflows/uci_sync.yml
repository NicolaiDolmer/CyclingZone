name: UCI Rankings Sync

# PENSIONERET 2026-06-18: #1101-cutover afkoblede økonomien fra uci_points →
# base_value, og uci_points/rider_uci_history vises ikke længere player-facing
# (se RiderStatsPage.jsx + RiderDevelopmentTab.jsx). PCS strammede samtidig sin
# Cloudflare-beskyttelse, så cloudscraper-1.2.71 ikke længere kan scrape.
# Det ugentlige schedule er fjernet for at stoppe falske fejl-alarmer. Beholder
# workflow_dispatch så syncen kan genoplives manuelt hvis en real-rytter-sæson
# vender tilbage (kræver da en moderne Cloudflare-bypass, fx curl_cffi).
on:
  workflow_dispatch:        # Manuel kørsel fra GitHub Actions-siden

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scripts/requirements_uci.txt

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: pip install -r scripts/requirements_uci.txt

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Run UCI scraper
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.UCI_GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.UCI_GOOGLE_SHEET_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          SUPABASE_URL=$(printf '%s' "$SUPABASE_URL" | tr -d '[:space:]')
          SUPABASE_SERVICE_KEY=$(printf '%s' "$SUPABASE_SERVICE_KEY" | tr -d '[:space:]')
          GOOGLE_SHEET_ID=$(printf '%s' "$GOOGLE_SHEET_ID" | tr -d '[:space:]')
          export SUPABASE_URL SUPABASE_SERVICE_KEY GOOGLE_SHEET_ID
          python scripts/uci_scraper.py

      - name: Recalculate rider salaries
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          SUPABASE_URL=$(printf '%s' "$SUPABASE_URL" | tr -d '[:space:]')
          SUPABASE_SERVICE_KEY=$(printf '%s' "$SUPABASE_SERVICE_KEY" | tr -d '[:space:]')
          export SUPABASE_URL SUPABASE_SERVICE_KEY
          node backend/scripts/recalculateRiderSalaries.js

      - name: Upload log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: uci-scraper-log
          path: uci_scraper_error.log
          if-no-files-found: ignore
