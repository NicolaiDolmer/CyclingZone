name: CI (AI-Autopilot)

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_SERVICE_KEY: test-service-key
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Run backend tests
        run: npm test -- --test-reporter=spec

      - name: Lint backend
        run: npm run lint

  frontend-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VITE_API_URL: https://example.invalid
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Fetch main for PatchNotes guard
        if: github.event_name == 'pull_request'
        working-directory: .
        run: git fetch --no-tags --depth=1 origin main:refs/remotes/origin/main

      - name: Check PatchNotes version uniqueness
        working-directory: .
        run: node scripts/check-patch-notes-version.js

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Run frontend tests
        run: npm test -- --test-reporter=spec

      - name: Build frontend
        run: npm run build

  warning-budget:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Check lint warning budgets
        run: node scripts/check-eslint-warning-budget.mjs
