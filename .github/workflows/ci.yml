name: CI (AI-Autopilot)

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_SERVICE_KEY: test-service-key
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Run backend tests
        run: npm test -- --test-reporter=spec

      - name: Lint backend
        run: npm run lint

      - name: Race-engine launch-gate (#1102)
        run: npm run race:gate

  frontend-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VITE_API_URL: https://example.invalid
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Fetch main for PatchNotes guard
        if: github.event_name == 'pull_request'
        working-directory: .
        run: git fetch --no-tags --depth=1 origin main:refs/remotes/origin/main

      - name: Check PatchNotes version uniqueness
        working-directory: .
        run: node scripts/check-patch-notes-version.js

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Run frontend tests
        run: npm test -- --test-reporter=spec

      - name: Build frontend
        run: npm run build

  warning-budget:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Check lint warning budgets
        run: node scripts/check-eslint-warning-budget.mjs

  ui-anti-drift:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # #671 Plan 3 (spec DEL-C C1): forward-guard mod slop-drift i frontend/src.
    # Fejler KUN paa NYE raa hex / slop-tells (rounded-xl/2xl/3xl, glow,
    # backdrop-blur, blob-blur) / emoji-som-ikon ud over scripts/ui-slop-baseline.json
    # (ratchet — maa kun skrumpe). Kendte callsites + emoji er Plan 4's job.
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Test anti-drift guard
        run: node --test scripts/lint-ui-slop.test.mjs

      - name: Run anti-drift guard
        run: node scripts/lint-ui-slop.mjs

  migration-idempotency:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # #401 migration-drift guard: NEW database/2026-*.sql migrations must use
    # idempotent DDL (IF NOT EXISTS / DROP ... IF EXISTS first / DO-block guard)
    # so a re-run (recovery replay, partial-failure re-apply, fresh rebuild from
    # the migration log) is a no-op rather than an error. schema.sql +
    # supabase_setup.sql stay as bootstrap/DR snapshots. Rule + recipes:
    # docs/MIGRATIONS.md.
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Test idempotency guard
        run: node --test scripts/lint-migration-idempotency.test.mjs

      - name: Run idempotency guard
        run: node scripts/lint-migration-idempotency.mjs

  postgrest-cap-guard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Forward-guard mod PostgREST 1000-rækkers-cap-trunkering. Samme bug
    # shippet 3× (#1798, #1839, #1841): en `.in("col", ids.slice(0, N))` capper
    # id-listen, PostgREST capper svaret ved 1000 rows — begge trunkerer TAVST,
    # så tal/aggregater læser falsk lavt uden fejl. Flagger nye forekomster i
    # backend + frontend/src; range-paginer + id-chunk i stedet (fetchAllRows /
    # fetchAll*-helpers). Opt-out: `postgrest-cap-ok`-kommentar med begrundelse.
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Test postgrest-cap guard
        run: node --test scripts/lint-postgrest-in-cap.test.mjs

      - name: Run postgrest-cap guard
        run: node scripts/lint-postgrest-in-cap.mjs

  getuser-guard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Forward-guard mod getUser()→null-deref-crashklassen (#1792, Sentry
    # CYCLINGZONE-16): en udløbet session giver `user = null`, og en bar
    # `user.id`-deref vælter hele siden. #1792 tilføjede inline-guards overalt,
    # men forhindrer ikke en NY side i at glemme guarden. Flagger `getUser()` /
    # `getAuthedUser()` hvis resultatet deref'es før en null-guard. Brug helper +
    # guard (frontend/src/lib/getAuthedUser.js). Opt-out: `getuser-guard-ok`.
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Test getuser guard
        run: node --test scripts/lint-getuser-guard.test.mjs

      - name: Run getuser guard
        run: node scripts/lint-getuser-guard.mjs

  rankings-fetch-guard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Forward-guard mod rangliste perf-regressionen (#2196 Del 2). #2175 (Del 1)
    # flyttede /standings + /rider-rankings fra en ~38k-rækkers client-fetch af
    # race_results til Postgres-matviews. En ny direkte .from("race_results")-fetch
    # i en rangliste-sti gen-introducerer den tavse perf-regression (langsom side,
    # ingen fejl). Flagger de tre rangliste-datastier; query matviewet i stedet.
    # Opt-out: `rankings-raceresults-ok`-kommentar med begrundelse.
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Test rankings-fetch guard
        run: node --test scripts/lint-rankings-raceresults-fetch.test.mjs

      - name: Run rankings-fetch guard
        run: node scripts/lint-rankings-raceresults-fetch.mjs

  riders-column-grant-guard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Forward-guard mod #2238 (rytter-siden tom for alle brugere): riders +
    # rider_derived_abilities bruger KOLONNE-niveau SELECT-grants (#1162), ikke
    # tabel-niveau — en ny kolonne er usynlig for anon/authenticated indtil den
    # eksplicit GRANT'es. Samme bug shippede 3× (#1309, ability_progress 12/6,
    # #2238's owner_is_ai). Guarden er selv-udvidende: den registrerer et
    # tabel-navn som "gated" fra den REVOKE SELECT ON <table> FROM
    # anon/authenticated den finder i korpusset, så den dækker automatisk
    # enhver fremtidig tabel der adopterer samme mønster — ikke kun riders.
    # Statisk (parser database/*.sql), ingen DB-adgang nødvendig i CI.
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Test riders-column-grant guard
        run: node --test scripts/lint-riders-column-grant.test.mjs

      - name: Run riders-column-grant guard
        run: node scripts/lint-riders-column-grant.mjs

  swallowed-catch-guard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Forward-guard mod NYE svaltede catch-blokke (#2395 del 2). En catch der
    # hverken captureException'er, rethrow'er eller bærer en '// best-effort'-markør
    # skjuler fejl for Sentry (Sentry-hærdningen 12/7 fandt ~20 sådanne, flere ægte).
    # Ratchet pr. fil: baseline låst efter audit-oprydningen — en net-ny svaltet
    # catch fejler CI. Statisk (heuristik-scanner), ingen DB/runtime nødvendig.
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Test swallowed-catch guard
        run: node --test scripts/lint-swallowed-catches.test.mjs

      - name: Run swallowed-catch guard
        run: node scripts/lint-swallowed-catches.mjs

  silent-mutation-guard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Forward-guard mod NYE tavse fejl fra de 6 feedback-kontrakt-hooks (#2465).
    # useTraining/useAcademy/useFacilities/usePlanner/useScouting/useScoutingCentral
    # returnerer alle eksplicit {ok,error} — et kald der hverken await'es, return'es
    # eller .then()-kædes lader en fejl (session/netværk/backend-afvisning) forsvinde
    # tavst i UI'et. Ratchet pr. fil, samme mønster som swallowed-catch-guard.
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Test silent-mutation guard
        run: node --test scripts/lint-silent-mutations.test.mjs

      - name: Run silent-mutation guard
        run: node scripts/lint-silent-mutations.mjs
