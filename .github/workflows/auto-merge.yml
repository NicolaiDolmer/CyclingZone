name: Auto-merge labeled PR

# Trigger: Bruger tilføjer 'auto-merge' label på en PR (fra mobil eller desktop)
# Effekt: Venter synkront på required CI checks → squash-merger → trigger deploy-verify
# eksplicit via workflow_dispatch.
#
# Hvorfor IKKE `gh pr merge --auto`: GitHub's anti-loop-safeguard blokerer downstream
# workflows (push, pull_request: closed) når mergen kommer fra GITHUB_TOKEN — det
# fanger #118 (lint-staged 17, mergede 2026-05-08T10:36 uden deploy-verify).
# workflow_dispatch er undtaget fra safeguard og fyrer altid en ny run.
#
# Sikkerheds-net: Branch protection er stadig håndhævet — `gh pr merge` fejler hvis
# CI ikke grøn eller PR i draft.

on:
  pull_request:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  actions: write   # workflow_dispatch på deploy-verify
  checks: read     # gh pr checks + gh api .../check-runs (statusCheckRollup → check-runs)
  statuses: read   # gh pr checks (statusCheckRollup → commit statuses); fjernes IKKE — GitHub strammede 2026-05-18, se .claude/learnings/2026-05-18-auto-merge-graphql-permissions.md

concurrency:
  group: auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  auto-merge:
    if: github.event.label.name == 'auto-merge'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Guard high-risk labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          LABELS=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json labels --jq '.labels[].name')
          if echo "$LABELS" | grep -Eq '^(risk:med|risk:high|needs-decision|security|manual-review)$'; then
            gh pr edit "$PR_NUMBER" --repo "${{ github.repository }}" --remove-label "auto-merge" || true
            gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" --body "⛔ **Auto-merge afvist** — PR'en har en høj-risiko label (\`risk:med\`, \`risk:high\`, \`needs-decision\`, \`security\` eller \`manual-review\`). Fjern/ret label efter manuel review og tilføj \`auto-merge\` igen hvis den må shippe automatisk."
            exit 1
          fi

      - name: Confirm queued
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" --body "🚀 **Auto-merge i kø** — venter synkront på required checks (\`backend-tests\`, \`frontend-build\`, \`dependency-review\` m.fl.) + \`frontend-smoke\` (fuld Playwright-suite) + advisory AI-review. Squash-merger automatisk når grøn, og trigger deploy-verify bagefter. Fjern \`auto-merge\` label for at annullere."

      - name: Wait for required checks (backend-tests + frontend-build)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr checks "$PR_NUMBER" --repo "${{ github.repository }}" --watch --fail-fast --required

      # Værn mod stille e2e-spec-rot (2026-07-02): PR #2037 og #2110 blev merget
      # med RØD frontend-smoke, fordi `gh pr checks --required` kun venter på
      # required checks. Indtil frontend-smoke er flippet til required i branch
      # protection, ventes der eksplicit her. skipped/neutral = OK (docs-/
      # backend-PR'er skipper suiten via changes-jobbet i playwright-smoke.yml).
      # Postmortem: .claude/learnings/2026-07-02-e2e-spec-rot-ci-gater-kun-core-smoke.md
      - name: Wait for frontend-smoke (fuld Playwright-suite)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          HEAD_SHA=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json headRefOid --jq .headRefOid)
          # 60 × 15s = 15 min — suiten tager ~4-5 min, men kan starte sent i køen.
          for _ in $(seq 1 60); do
            SMOKE_JSON=$(gh api "repos/${{ github.repository }}/commits/$HEAD_SHA/check-runs?check_name=frontend-smoke" --jq '.check_runs[0] // empty')
            if [ -z "$SMOKE_JSON" ]; then
              echo "No frontend-smoke check found for $HEAD_SHA; continuing."
              exit 0
            fi
            STATUS=$(echo "$SMOKE_JSON" | jq -r '.status')
            CONCLUSION=$(echo "$SMOKE_JSON" | jq -r '.conclusion // ""')
            if [ "$STATUS" = "completed" ]; then
              if [ "$CONCLUSION" = "success" ] || [ "$CONCLUSION" = "neutral" ] || [ "$CONCLUSION" = "skipped" ]; then
                echo "frontend-smoke concluded: ${CONCLUSION:-<none>}"
                exit 0
              fi
              gh pr edit "$PR_NUMBER" --repo "${{ github.repository }}" --remove-label "auto-merge" || true
              gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" --body "⛔ **Auto-merge stoppet** — \`frontend-smoke\` (fuld Playwright-suite) endte med \`$CONCLUSION\`. Rød e2e må ikke merges stille (#2000-spec-rot → PR #2114): fix koden eller opdatér spec'en, og tilføj \`auto-merge\` igen."
              exit 1
            fi
            sleep 15
          done
          echo "frontend-smoke is still running after 15 min; leaving PR open for manual follow-up."
          exit 1

      - name: Wait for advisory AI review if present
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          LABELS=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json labels --jq '.labels[].name')
          if echo "$LABELS" | grep -qx 'skip-ai-review'; then
            echo "skip-ai-review label present; continuing."
            exit 0
          fi

          HEAD_SHA=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json headRefOid --jq .headRefOid)
          for _ in $(seq 1 20); do
            REVIEW_JSON=$(gh api "repos/${{ github.repository }}/commits/$HEAD_SHA/check-runs?check_name=review" --jq '.check_runs[0] // empty')
            if [ -z "$REVIEW_JSON" ]; then
              echo "No advisory review check found; continuing."
              exit 0
            fi
            STATUS=$(echo "$REVIEW_JSON" | jq -r '.status')
            CONCLUSION=$(echo "$REVIEW_JSON" | jq -r '.conclusion // ""')
            if [ "$STATUS" = "completed" ]; then
              if [ "$CONCLUSION" = "success" ] || [ "$CONCLUSION" = "neutral" ] || [ "$CONCLUSION" = "skipped" ]; then
                exit 0
              fi
              gh pr edit "$PR_NUMBER" --repo "${{ github.repository }}" --remove-label "auto-merge" || true
              gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" --body "⛔ **Auto-merge stoppet** — advisory AI-review endte med \`$CONCLUSION\`. Review PR'en manuelt, eller tilføj \`skip-ai-review\` hvis fejlen er kendt og ufarlig."
              exit 1
            fi
            sleep 15
          done
          echo "Advisory review is still running; leaving PR open for manual follow-up."
          exit 1

      - name: Squash-merge PR
        id: merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr merge "$PR_NUMBER" --repo "${{ github.repository }}" --squash --delete-branch
          SHA=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json mergeCommit --jq .mergeCommit.oid)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Merged to $SHA"

      - name: Trigger deploy-verify (anti-loop workaround)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SHA: ${{ steps.merge.outputs.sha }}
        run: |
          gh workflow run deploy-verify.yml --repo "${{ github.repository }}" --ref main \
            -f sha="$SHA" \
            -f pr_number="$PR_NUMBER"

      - name: Notify on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" --body "❌ **Auto-merge fejlede** — [se log]($RUN_URL)

          Tjek: er PR i draft? Er der merge-konflikter? Er CI rødt?
          Workaround: merge manuelt eller re-tilføj \`auto-merge\` label."
