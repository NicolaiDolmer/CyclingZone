name: i18n · Key coverage

on:
  pull_request:
    paths:
      - 'frontend/public/locales/**'
      - 'frontend/src/**'
      - 'scripts/i18n-check-keys.mjs'
      - 'scripts/i18n-check-namespace-inline.mjs'
      - 'scripts/i18n-check-nav-strings.mjs'
      - 'scripts/i18n-check-page-untranslated.mjs'
      - 'scripts/i18n-check-lib-strings.mjs'
      - '.github/workflows/i18n-check.yml'
  push:
    branches: [main]
    paths:
      - 'frontend/public/locales/**'
      - 'frontend/src/**'
      - 'scripts/i18n-check-keys.mjs'
      - 'scripts/i18n-check-namespace-inline.mjs'
      - 'scripts/i18n-check-nav-strings.mjs'
      - 'scripts/i18n-check-page-untranslated.mjs'
      - 'scripts/i18n-check-lib-strings.mjs'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  key-coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Advisory i Fase 1 (Refs #410). Promotes til required via branch
    # protection ved Fase 5 (#414) — eller når en/da har overlappende
    # keys ud over `common.json`.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Run i18n key-coverage check
        run: node scripts/i18n-check-keys.mjs

  namespace-inline:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # REQUIRED — fanger den bug-klasse hvor t() returnerer raw key på first
    # paint fordi namespace er useTranslation'et men ikke inlinet i resources
    # (Refs #470, postmortem 2026-05-17). Med useSuspense: false er dette en
    # USER-VISIBLE regression, ikke en advisory.
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Run i18n namespace-inline guard
        run: node scripts/i18n-check-namespace-inline.mjs

  nav-strings:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # REQUIRED — fanger hardkodede label-strings i navigation/sidebar/layout-
    # komponenter. Bug-klassen: MobileQuickNav.jsx havde `label: "Indbakke"`
    # mens desktop sidebar brugte `label: t("nav.item.notifications")` —
    # parallelle nav-strukturer drifter ud af sync når kun den ene migreres
    # til i18n (#689, postmortem 2026-05-26).
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Run i18n nav-strings guard
        run: node scripts/i18n-check-nav-strings.mjs

  page-untranslated:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # REQUIRED (Refs #678) — fanger HELE player-facing sider uden useTranslation
    # der render hardkodet dansk (usynlige for de øvrige i18n-guards). Var
    # advisory mens de kendte pre-eksisterende leaks (Resultater/SeasonEnd/Founder)
    # blev konverteret; KNOWN_TODO-listen er nu tom, så jobbet er promoted til
    # required — en ny uoversat player-facing side blokerer nu PR'en.
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Run i18n page-untranslated guard
        run: node scripts/i18n-check-page-untranslated.mjs

  lib-strings:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # REQUIRED (Refs #1170) — fanger danske string-literals i lib/ og
    # components/ (usynlige for page-untranslated som kun scanner pages/).
    # Bug-klassen: CookieBanner/formatBidWarning rendered ren dansk i EN-mode
    # mens hele batteriet var grønt. KNOWN_TODO-listen i scriptet bærer de
    # kendte slice-B-leaks (waitlist-form, sentry-boundary) uden at fejle.
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Run i18n lib-strings guard
        run: node scripts/i18n-check-lib-strings.mjs
