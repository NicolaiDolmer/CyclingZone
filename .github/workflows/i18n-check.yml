name: i18n · Key coverage

on:
  pull_request:
    paths:
      - 'frontend/public/locales/**'
      - 'scripts/i18n-check-keys.mjs'
      - '.github/workflows/i18n-check.yml'
  push:
    branches: [main]
    paths:
      - 'frontend/public/locales/**'
      - 'scripts/i18n-check-keys.mjs'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    # Advisory i Fase 1 (Refs #410). Promotes til required via branch
    # protection ved Fase 5 (#414) — eller når en/da har overlappende
    # keys ud over `common.json`.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Run i18n key-coverage check
        run: node scripts/i18n-check-keys.mjs
