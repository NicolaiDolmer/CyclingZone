name: i18n · Key coverage

on:
  # Required jobs must report on every PR. A path-filtered required workflow
  # leaves docs/config-only PRs waiting forever because no check run exists.
  pull_request:
  push:
    branches: [main]
    paths:
      - 'frontend/public/locales/**'
      - 'frontend/src/**'
      - 'backend/routes/**'
      - 'backend/lib/**'
      - 'scripts/i18n-check-keys.mjs'
      - 'scripts/i18n-check-namespace-inline.mjs'
      - 'scripts/i18n-check-nav-strings.mjs'
      - 'scripts/i18n-check-page-untranslated.mjs'
      - 'scripts/i18n-check-lib-strings.mjs'
      - 'scripts/i18n-check-leaks.mjs'
      - 'scripts/i18n-leaks-baseline.json'
      - 'scripts/tone-check-em-dash.mjs'
      - 'scripts/tone-check-em-dash.test.mjs'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  key-coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Advisory i Fase 1 (Refs #410). Promotes til required via branch
    # protection ved Fase 5 (#414) — eller når en/da har overlappende
    # keys ud over `common.json`.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Run i18n key-coverage check
        run: node scripts/i18n-check-keys.mjs

  namespace-inline:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # REQUIRED — fanger den bug-klasse hvor t() returnerer raw key på first
    # paint fordi namespace er useTranslation'et men ikke inlinet i resources
    # (Refs #470, postmortem 2026-05-17). Med useSuspense: false er dette en
    # USER-VISIBLE regression, ikke en advisory.
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Run i18n namespace-inline guard
        run: node scripts/i18n-check-namespace-inline.mjs

  nav-strings:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # REQUIRED — fanger hardkodede label-strings i navigation/sidebar/layout-
    # komponenter. Bug-klassen: MobileQuickNav.jsx havde `label: "Indbakke"`
    # mens desktop sidebar brugte `label: t("nav.item.notifications")` —
    # parallelle nav-strukturer drifter ud af sync når kun den ene migreres
    # til i18n (#689, postmortem 2026-05-26).
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Run i18n nav-strings guard
        run: node scripts/i18n-check-nav-strings.mjs

  page-untranslated:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # REQUIRED (Refs #678) — fanger HELE player-facing sider uden useTranslation
    # der render hardkodet dansk (usynlige for de øvrige i18n-guards). Var
    # advisory mens de kendte pre-eksisterende leaks (Resultater/SeasonEnd/Founder)
    # blev konverteret; KNOWN_TODO-listen er nu tom, så jobbet er promoted til
    # required — en ny uoversat player-facing side blokerer nu PR'en.
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Run i18n page-untranslated guard
        run: node scripts/i18n-check-page-untranslated.mjs

  lib-strings:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # REQUIRED (Refs #1170) — fanger danske string-literals i lib/ og
    # components/ (usynlige for page-untranslated som kun scanner pages/).
    # Bug-klassen: CookieBanner/formatBidWarning rendered ren dansk i EN-mode
    # mens hele batteriet var grønt. KNOWN_TODO-listen er nu tom; legitime
    # undtagelser er dokumenteret separat i EXEMPT_FILES.
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Run i18n lib-strings guard
        run: node scripts/i18n-check-lib-strings.mjs

  leak-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # REQUIRED (Refs #1068) — forward-guard for de to leak-mønstre #678 fandt
    # mens key-coverage var grøn: (A) DA-tekst i EN-locale-VÆRDIER (æ/ø/å +
    # danske stopord; identiske EN/DA-værdier er advisory), (B) hardcodet
    # dansk i player-facing kode (frontend/src minus lib+components, som
    # lib-strings dækker; backend error/message-strenge). Kendte leaks ligger
    # i scripts/i18n-leaks-baseline.json (ratchet — må kun skrumpe), så jobbet
    # er grønt på main og fejler KUN på NYE leaks. Fixes af kendte leaks
    # fejler aldrig (stale baseline = info). Stram baselinen med:
    #   node scripts/i18n-check-leaks.mjs --update-baseline
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Run i18n leak guard
        run: node scripts/i18n-check-leaks.mjs

  tone-em-dash:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # REQUIRED (Refs #1172/#671) — tone-guard: ingen em-dash i player-facing
    # copy (locales + PatchNotes + privacy-prosa). Reglen har bidt 2x: forkert
    # registreret som overholdt 2026-06-04; 229 live + 522 historiske fundet
    # og sweepet 2026-06-09 (PR #1193). Guarden fryser den sweepede tilstand.
    # Tilladt undtagelse: enkeltstående `—` som tom-værdi-glyf (TONE_OF_VOICE
    # §Punktuation).
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Test tone em-dash guard
        run: node --test scripts/tone-check-em-dash.test.mjs

      - name: Run tone em-dash guard
        run: node scripts/tone-check-em-dash.mjs
