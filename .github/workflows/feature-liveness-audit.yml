name: Feature-liveness audit

# Backwards-audit der finder "deployed kode + 0 data / 0 brugere"-mønstret.
# Generaliserer slice 14 / #279 lærepenge til 4 detector-klasser:
#   A — write-but-no-data
#   B — orphaned-endpoints
#   C — migration-drift
#   D — schema-drift
#
# Triggers:
#   - PR der rører schema, backend-routes, frontend supabase/fetch eller scriptet selv
#     → blokerer merge ved nye findings (bot-comment forklarer hvad)
#   - Weekly cron (mandage 04:00 UTC, før UCI-scraper og før RLS-audit) → catcher
#     drift fra Studio-changes uden migration eller dead-code-akkumulering
#   - Manual workflow_dispatch

on:
  pull_request:
    paths:
      - 'database/**'
      - 'backend/routes/**'
      - 'backend/lib/**'
      - 'backend/server.js'
      - 'backend/scripts/audit-feature-liveness.js'
      - 'frontend/src/**'
      - '.github/workflows/feature-liveness-audit.yml'
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Run feature-liveness audit
        id: audit
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          export SUPABASE_URL=$(printf '%s' "$SUPABASE_URL" | tr -d '[:space:]')
          export SUPABASE_SERVICE_KEY=$(printf '%s' "$SUPABASE_SERVICE_KEY" | tr -d '[:space:]')
          node backend/scripts/audit-feature-liveness.js --json > feature-liveness.json
          node backend/scripts/audit-feature-liveness.js | tee feature-liveness.txt
          total=$(node -e "const d=require('./feature-liveness.json');console.log(d.total_findings)")
          echo "total=$total" >> "$GITHUB_OUTPUT"

      - name: Upload report
        uses: actions/upload-artifact@v7
        with:
          name: feature-liveness-report
          path: |
            feature-liveness.json
            feature-liveness.txt

      - name: Comment on PR if findings (PR runs only)
        if: github.event_name == 'pull_request' && steps.audit.outputs.total != '0'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('feature-liveness.txt', 'utf8');
            const body = [
              '## ❌ Feature-liveness audit fandt nye findings',
              '',
              'Audit'en fanger "deployed kode + 0 data / 0 brugere"-mønstret (slice 14 / [#279](https://github.com/${{ github.repository }}/issues/279) generaliseret per [#287](https://github.com/${{ github.repository }}/issues/287)).',
              '',
              '```',
              report.trim(),
              '```',
              '',
              'Fix: enten ret den underliggende drift, eller tilføj eksplicit whitelist-entry i `backend/scripts/audit-feature-liveness.js` med en kommentar der dokumenterer **hvorfor** det er intentional.',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Open or update tracking issue (scheduled runs only)
        if: github.event_name == 'schedule' && steps.audit.outputs.total != '0'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('feature-liveness.json', 'utf8'));
            const report = fs.readFileSync('feature-liveness.txt', 'utf8');
            const title = `[bot] Feature-liveness audit fandt ${data.total_findings} drift-finding(s)`;
            const body = [
              '## Feature-liveness drift detected',
              '',
              `Ugentligt cron-run (${new Date().toISOString().slice(0,10)}) fandt **${data.total_findings}** finding(s) — A=${data.by_detector.A} B=${data.by_detector.B} C=${data.by_detector.C} D=${data.by_detector.D}.`,
              '',
              'Mest sandsynligt: schema/route/frontend-drift introduceret uden om de normale guard-rails (Studio-änding, migration uden push, eller dead code-akkumulering).',
              '',
              '```',
              report.trim(),
              '```',
              '',
              'Run-link: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}',
            ].join('\n');
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'quality-drift',
            });
            if (existing.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing[0].number,
                title,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['quality-drift', 'priority:high', 'type:bug', 'claude:todo'],
              });
            }

      - name: Fail if findings
        if: steps.audit.outputs.total != '0'
        run: |
          echo "::error::Feature-liveness audit found ${{ steps.audit.outputs.total }} finding(s). See report artifact."
          exit 1
