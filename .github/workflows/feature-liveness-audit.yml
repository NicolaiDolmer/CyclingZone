name: Feature-liveness audit

# Backwards-audit der finder "deployed kode + 0 data / 0 brugere"-mønstret.
# Generaliserer slice 14 / #279 lærepenge til 5 detector-klasser:
#   A — write-but-no-data
#   B — orphaned-endpoints
#   C — migration-drift
#   D — schema-drift
#   E — zero-impression-features (player_events; PR-runs skipper, kun cron)
#
# Triggers:
#   - PR der rører schema, backend-routes, frontend supabase/fetch eller scriptet selv
#     → blokerer merge ved nye findings (bot-comment forklarer hvad)
#   - Weekly cron (mandage 04:00 UTC, før UCI-scraper og før RLS-audit) → catcher
#     drift fra Studio-changes uden migration eller dead-code-akkumulering
#   - Manual workflow_dispatch

on:
  pull_request:
    paths:
      - 'database/**'
      - 'backend/routes/**'
      - 'backend/lib/**'
      - 'backend/server.js'
      - 'backend/scripts/audit-feature-liveness.js'
      - 'frontend/src/**'
      - '.github/workflows/feature-liveness-audit.yml'
  # #639 (Option D): run Detector C (migration-drift) on push to main as well.
  # Cron is once-weekly so a botched auto-migrate (like the #635 unescaped
  # apostrophe) could sit drifted for up to 7 days. Running C on every push
  # gives us mean-time-to-detect ~5 min instead. Detectors A, B, D, E stay
  # cron-only — they either need accumulated event data (E) or only catch
  # things a PR audit-run already covered (A, B, D).
  push:
    branches: [main]
    paths:
      - 'database/**'
      - 'backend/scripts/audit-feature-liveness.js'
      - '.github/workflows/feature-liveness-audit.yml'
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Skip secret-backed audit for Dependabot PRs
        if: github.event_name == 'pull_request' && github.event.pull_request.user.login == 'dependabot[bot]'
        run: echo "Skipping feature-liveness audit for Dependabot PR because repository secrets are unavailable to Dependabot-triggered pull_request workflows."

      - name: Check out repository
        if: github.event_name != 'pull_request' || github.event.pull_request.user.login != 'dependabot[bot]'
        uses: actions/checkout@v6

      - name: Set up Node.js
        if: github.event_name != 'pull_request' || github.event.pull_request.user.login != 'dependabot[bot]'
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        if: github.event_name != 'pull_request' || github.event.pull_request.user.login != 'dependabot[bot]'
        run: npm ci
        working-directory: backend

      - name: Run feature-liveness audit
        if: github.event_name != 'pull_request' || github.event.pull_request.user.login != 'dependabot[bot]'
        id: audit
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          # Declare-and-assign-separately satisfies shellcheck SC2155
          # (return value of $() would otherwise be masked by export's exit code).
          SUPABASE_URL=$(printf '%s' "$SUPABASE_URL" | tr -d '[:space:]')
          SUPABASE_SERVICE_KEY=$(printf '%s' "$SUPABASE_SERVICE_KEY" | tr -d '[:space:]')
          export SUPABASE_URL SUPABASE_SERVICE_KEY
          # PR-runs skipper Detector C og E:
          # - C (migration-drift) ville falsk-positivt flage hver ny migration
          #   som "committed men ikke applied" fordi auto-migrate først kører
          #   efter merge til main. Cron + workflow_dispatch fanger ægte drift.
          # - E (zero-impression-features) tager dage/uger at akkumulere events
          #   efter rollout — kun cron-runs evaluerer E.
          # Push-til-main-runs (#639 Option D): kør KUN Detector C. A/B/D
          # blev allerede tjekket af PR-runet og ville bare bruge ekstra
          # Action-minutter; E er weekly-only. C er forward-guard mod den
          # præcise klasse #635 bug ramte: failed auto-migrate → manglende
          # schema_migrations-row.
          SKIP_FLAG=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            SKIP_FLAG="--skip=C,E"
          elif [ "${{ github.event_name }}" = "push" ]; then
            SKIP_FLAG="--skip=A,B,D,E"
          fi
          node backend/scripts/audit-feature-liveness.js $SKIP_FLAG --json > feature-liveness.json
          node backend/scripts/audit-feature-liveness.js $SKIP_FLAG | tee feature-liveness.txt
          total=$(node -e "const d=require('./feature-liveness.json');console.log(d.total_findings)")
          echo "total=$total" >> "$GITHUB_OUTPUT"

      - name: Upload report
        if: github.event_name != 'pull_request' || github.event.pull_request.user.login != 'dependabot[bot]'
        uses: actions/upload-artifact@v7
        with:
          name: feature-liveness-report
          path: |
            feature-liveness.json
            feature-liveness.txt

      - name: Comment on PR if findings (PR runs only)
        if: github.event_name == 'pull_request' && steps.audit.outputs.total != '0'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('feature-liveness.txt', 'utf8');
            const body = [
              '## ❌ Feature-liveness audit fandt nye findings',
              '',
              'Auditen fanger "deployed kode + 0 data / 0 brugere"-mønstret (slice 14 / [#279](https://github.com/${{ github.repository }}/issues/279) generaliseret per [#287](https://github.com/${{ github.repository }}/issues/287)).',
              '',
              '```',
              report.trim(),
              '```',
              '',
              'Fix: enten ret den underliggende drift, eller tilføj eksplicit whitelist-entry i `backend/scripts/audit-feature-liveness.js` med en kommentar der dokumenterer **hvorfor** det er intentional.',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Open or update tracking issue (scheduled + push-to-main runs)
        if: (github.event_name == 'schedule' || github.event_name == 'push') && steps.audit.outputs.total != '0'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('feature-liveness.json', 'utf8'));
            const report = fs.readFileSync('feature-liveness.txt', 'utf8');
            const trigger = '${{ github.event_name }}' === 'push'
              ? `push-to-main (commit ${'${{ github.sha }}'.slice(0, 7)})`
              : `weekly cron-run (${new Date().toISOString().slice(0,10)})`;
            const title = `[bot] Feature-liveness audit fandt ${data.total_findings} drift-finding(s)`;
            const body = [
              '## Feature-liveness drift detected',
              '',
              `Trigger: ${trigger} fandt **${data.total_findings}** finding(s) — A=${data.by_detector.A} B=${data.by_detector.B} C=${data.by_detector.C} D=${data.by_detector.D}.`,
              '',
              'Mest sandsynligt: schema/route/frontend-drift introduceret uden om de normale guard-rails (Studio-änding, migration uden push, eller dead code-akkumulering).',
              '',
              '```',
              report.trim(),
              '```',
              '',
              'Run-link: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}',
            ].join('\n');
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'quality-drift',
            });
            if (existing.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing[0].number,
                title,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['quality-drift', 'priority:high', 'type:bug', 'claude:todo'],
              });
            }

      - name: Fail if findings
        if: steps.audit.outputs.total != '0'
        run: |
          echo "::error::Feature-liveness audit found ${{ steps.audit.outputs.total }} finding(s). See report artifact."
          exit 1
