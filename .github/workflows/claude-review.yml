name: Auto PR review

# PENSIONERET 2026-06-25 (#1870): CodeRabbit overtog AI-auto-review via
# `.coderabbit.yaml`. To AI-auto-reviewere = dobbeltstøj; CodeRabbit er
# purpose-built (inline-forslag, learnings, husregler) og bevist på ægte PR'er
# (#1867/#1871/#1873/#1874).
#
# Hvorfor no-op i stedet for at SLETTE workflowet: jobbet `review` er en required
# status check i branch protection. Sletning ville efterlade checken uden
# rapportering → ALLE PR'er blokeret. Derfor rapporterer dette job bevidst grønt
# uden at gøre noget. @claude on-demand findes stadig via `claude.yml`.
#
# Historik: dette var et Sonnet-baseret advisory risk-review (#877). Fuld
# tidligere config i git-historikken før denne commit.

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

permissions:
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Retired — CodeRabbit owns AI PR review
        run: |
          echo "Claude auto-review pensioneret 2026-06-25 (#1870)."
          echo "CodeRabbit håndterer nu AI-auto-review via .coderabbit.yaml."
          echo "Required check 'review' rapporterer grønt som no-op (slet ikke jobbet"
          echo "— det er en required status check; sletning blokerer alle PR'er)."
