name: Auto PR review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review denne PR. Tjek:
            1. Korrekthed (gør ændringerne det de hævder?)
            2. Konsistens med projekt-konventioner i CLAUDE.md + docs/CONVENTIONS.md
            3. Sikkerhed (auth-checks, RLS, input-validation)
            4. Tests dækker ny funktionalitet
            5. Doc-drift (PRODUCT_BACKLOG, NOW.md, FEATURE_STATUS opdateret hvor relevant)
            Post fund som review-comments med konkrete linje-referencer.
          claude_args: "--max-turns 8 --model claude-opus-4-7"
