name: Dependency review

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Block vulnerable dependency changes
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
