name: Deploy verify

# Trigger:
#  - Push til main (manuel commit eller bruger-merget PR — push-eventet fyrer for
#    alle non-GITHUB_TOKEN merges). BEMÆRK: ingen `pull_request: closed`-trigger;
#    den var redundant med push og gav tvilling-runs for samme merge-commit, som
#    cancellede hinanden via concurrency-gruppen (falsk "cancelled" i verify-deploy.ps1).
#  - workflow_dispatch — eksplicit trigger fra auto-merge.yml/dependabot-auto-merge.yml,
#    fordi GITHUB_TOKEN-merges ikke fyrer push/pull_request events (anti-loop-safeguard).
# Effekt: Venter på Vercel + Railway deploy, smoke-tester prod, kommenterer ✅/❌
# på den merged PR. Brugeren kan trygt være offline efter mobile-merge.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      sha:
        description: 'Commit SHA to verify (defaults to main HEAD)'
        required: false
      pr_number:
        description: 'PR number to comment on (optional, auto-detected from SHA)'
        required: false

permissions:
  contents: read
  pull-requests: write
  deployments: read
  actions: read
  issues: write

concurrency:
  group: deploy-verify-${{ github.event.inputs.sha || github.sha }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve target sha and PR number
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          PUSH_SHA: ${{ github.sha }}
          INPUT_SHA: ${{ github.event.inputs.sha }}
          INPUT_PR_NUMBER: ${{ github.event.inputs.pr_number }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            SHA="${INPUT_SHA:-$(gh api repos/${{ github.repository }}/commits/main --jq .sha)}"
            if [[ -n "$INPUT_PR_NUMBER" ]]; then
              NUMBER="$INPUT_PR_NUMBER"
            else
              NUMBER=$(gh api "repos/${{ github.repository }}/commits/$SHA/pulls" --jq '.[0].number // empty')
            fi
          else
            SHA="$PUSH_SHA"
            NUMBER=$(gh api "repos/${{ github.repository }}/commits/$SHA/pulls" --jq '.[0].number // empty')
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "number=$NUMBER" >> "$GITHUB_OUTPUT"
          echo "Verifying sha=$SHA, PR=#${NUMBER:-(direct push)}"

      - name: Wait for Vercel + Railway deployments
        id: deployments
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ steps.pr.outputs.sha }}
        run: |
          DEADLINE=$(($(date +%s) + 600))  # 10 min timeout
          while [[ "$(date +%s)" -lt "$DEADLINE" ]]; do
            DEPLOYMENTS=$(gh api "repos/${{ github.repository }}/deployments?sha=$SHA&per_page=20")
            VERCEL_OK=false
            RAILWAY_OK=false

            for ID in $(echo "$DEPLOYMENTS" | jq -r '.[].id'); do
              CREATOR=$(echo "$DEPLOYMENTS" | jq -r ".[] | select(.id==$ID) | .creator.login")
              STATE=$(gh api "repos/${{ github.repository }}/deployments/$ID/statuses" --jq '.[0].state // "pending"')
              echo "  deployment $ID by $CREATOR → $STATE"
              if [[ "$CREATOR" == vercel* && "$STATE" == "success" ]]; then VERCEL_OK=true; fi
              if [[ "$CREATOR" == railway* && "$STATE" == "success" ]]; then RAILWAY_OK=true; fi
            done

            if $VERCEL_OK && $RAILWAY_OK; then
              echo "Both deployments succeeded"
              echo "vercel=success" >> "$GITHUB_OUTPUT"
              echo "railway=success" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            sleep 15
          done

          echo "Timeout waiting for deployments"
          echo "vercel=$VERCEL_OK" >> "$GITHUB_OUTPUT"
          echo "railway=$RAILWAY_OK" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Smoke-test prod
        id: smoke
        run: |
          BACKEND_HEALTH=$(curl -s -o /dev/null -w "%{http_code}" https://cyclingzone-production.up.railway.app/health)
          BACKEND_AUTH=$(curl -s -o /dev/null -w "%{http_code}" https://cyclingzone-production.up.railway.app/api/auctions)
          FRONTEND=$(curl -s -o /dev/null -w "%{http_code}" -L https://cycling-zone.vercel.app/)

          {
            echo "backend_health=$BACKEND_HEALTH"
            echo "backend_auth=$BACKEND_AUTH"
            echo "frontend=$FRONTEND"
          } >> "$GITHUB_OUTPUT"

          # Acceptkriterier:
          # - /health returnerer 200
          # - /api/auctions uden token returnerer 401 (auth virker)
          # - frontend root returnerer 200 (efter redirect)
          OK=true
          [[ "$BACKEND_HEALTH" != "200" ]] && OK=false
          [[ "$BACKEND_AUTH" != "401" ]] && OK=false
          [[ "$FRONTEND" != "200" ]] && OK=false

          if $OK; then
            echo "result=success" >> "$GITHUB_OUTPUT"
          else
            echo "result=failure" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Verify Sentry source-maps uploaded (#621 item 3)
        id: sourcemaps
        # Opt-in via secrets. Hvis SENTRY_AUTH_TOKEN ikke er konfigureret i GitHub Actions
        # endnu, springes step (uden at fejle deploy-verify). Tilfoej alle 3 secrets for
        # at aktivere guarden mod stille source-map upload-fejl.
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SHA: ${{ steps.pr.outputs.sha }}
        run: |
          if [[ -z "$SENTRY_AUTH_TOKEN" || -z "$SENTRY_ORG" || -z "$SENTRY_PROJECT" ]]; then
            echo "::warning::Sentry source-map guard skipped — add SENTRY_AUTH_TOKEN/SENTRY_ORG/SENTRY_PROJECT secrets to enable (#621 item 3)"
            echo "result=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Sentry release name = git SHA (per frontend/vite.config.js sentryVitePlugin release.name)
          HTTP_CODE=$(curl -s -o /tmp/sentry-files.json -w "%{http_code}" \
            -H "Authorization: Bearer $SENTRY_AUTH_TOKEN" \
            -H "Accept: application/json" \
            "https://sentry.io/api/0/projects/$SENTRY_ORG/$SENTRY_PROJECT/releases/$SHA/files/?per_page=1")

          if [[ "$HTTP_CODE" == "404" ]]; then
            echo "::error::Sentry release ${SHA:0:7} findes ikke (404). Source-map upload fejlede stille — tjek Vercel build-log for sentryVitePlugin output."
            echo "result=missing-release" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "::error::Sentry API returnerede $HTTP_CODE — tjek SENTRY_AUTH_TOKEN scope (project:releases)"
            echo "result=api-error" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          FILE_COUNT=$(jq 'length' /tmp/sentry-files.json)
          if [[ "$FILE_COUNT" -eq 0 ]]; then
            echo "::error::Sentry release ${SHA:0:7} har 0 source-map files. Vercel sentryVitePlugin skippede upload — tjek SENTRY_AUTH_TOKEN/ORG/PROJECT i Vercel project env."
            echo "result=empty-release" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "Sentry release ${SHA:0:7} har source-map files uploaded (>=1)"
          echo "result=success" >> "$GITHUB_OUTPUT"

      - name: Comment success on merged PR
        if: success() && steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ steps.pr.outputs.number }}
          SHA: ${{ steps.pr.outputs.sha }}
        run: |
          BODY="<!-- deploy-verify:$SHA -->
          ✅ **Deploy verificeret LIVE** — \`${SHA:0:7}\`
          - Vercel deploy: success
          - Railway deploy: success
          - Backend \`/health\` = 200
          - Backend \`/api/auctions\` (no auth) = 401 (auth gates virker)
          - Frontend root = 200

          Du kan trygt lukke telefonen — det er live."
          COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/$PR/comments" --jq ".[] | select(.body | contains(\"<!-- deploy-verify:$SHA -->\")) | .id" | tail -n 1)
          if [ -n "$COMMENT_ID" ]; then
            gh api -X PATCH "repos/${{ github.repository }}/issues/comments/$COMMENT_ID" -f body="$BODY"
          else
            gh pr comment "$PR" --repo "${{ github.repository }}" --body "$BODY"
          fi

      - name: Comment failure on merged PR
        if: failure() && steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ steps.pr.outputs.number }}
          SHA: ${{ steps.pr.outputs.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BACKEND_HEALTH: ${{ steps.smoke.outputs.backend_health }}
          BACKEND_AUTH: ${{ steps.smoke.outputs.backend_auth }}
          FRONTEND: ${{ steps.smoke.outputs.frontend }}
          VERCEL: ${{ steps.deployments.outputs.vercel }}
          RAILWAY: ${{ steps.deployments.outputs.railway }}
        run: |
          BODY="<!-- deploy-verify:$SHA -->
          ❌ **Deploy-verify FEJLEDE** — \`${SHA:0:7}\` — [se log]($RUN_URL)
          - Vercel: \`${VERCEL:-unknown}\`
          - Railway: \`${RAILWAY:-unknown}\`
          - Backend \`/health\`: \`${BACKEND_HEALTH:-?}\` (forventet 200)
          - Backend \`/api/auctions\`: \`${BACKEND_AUTH:-?}\` (forventet 401)
          - Frontend: \`${FRONTEND:-?}\` (forventet 200)

          **Tjek prod nu** — auto-merge har sendt det live, men smoke-test fejlede. Mulig årsag: deploy-rollback, env-var mangler, healthcheck broken."
          COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/$PR/comments" --jq ".[] | select(.body | contains(\"<!-- deploy-verify:$SHA -->\")) | .id" | tail -n 1)
          if [ -n "$COMMENT_ID" ]; then
            gh api -X PATCH "repos/${{ github.repository }}/issues/comments/$COMMENT_ID" -f body="$BODY"
          else
            gh pr comment "$PR" --repo "${{ github.repository }}" --body "$BODY"
          fi
