name: UCI Translit Audit

on:
  workflow_dispatch:
    inputs:
      threshold:
        description: 'Fuzzy similarity-cutoff (0.0-1.0, default 0.6 fanger Matvey/Matvei ~0.83)'
        required: false
        default: '0.6'
      min_points:
        description: 'Skip PCS-ryttere med faerre point end dette (default 10)'
        required: false
        default: '10'

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scripts/requirements_uci.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements_uci.txt

      - name: Run UCI translit audit (source=sheet)
        env:
          # Scriptet's _clean_env() strippes whitespace internt — ingen behov
          # for re-export her (undgaar samtidig pre-push secret-leak heuristik).
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.UCI_GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.UCI_GOOGLE_SHEET_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python scripts/uci_audit.py \
            --mode translit \
            --source sheet \
            --threshold "${{ github.event.inputs.threshold }}" \
            --min-points "${{ github.event.inputs.min_points }}"

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: uci-translit-audit-${{ github.run_id }}
          path: audit-output/
          if-no-files-found: warn
          retention-days: 30
