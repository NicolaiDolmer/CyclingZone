name: Auto-add to project

on:
  issues:
    types: [opened, reopened, transferred]
  pull_request_target:
    types: [opened, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  add-to-project:
    name: Add to CyclingZone Roadmap
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' || github.event.pull_request.user.login != 'dependabot[bot]'
    steps:
      - uses: actions/add-to-project@v1.0.2
        with:
          project-url: https://github.com/users/NicolaiDolmer/projects/2
          github-token: ${{ secrets.PROJECTS_PAT }}
