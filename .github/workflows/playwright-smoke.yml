name: Playwright Smoke

# Kører den FULDE Playwright-suite (alle specs i frontend/tests/e2e,
# chromium-projekterne) — navnet "smoke" er historisk.
#
# Værn mod stille e2e-spec-rot (2026-07-02): da rytterprofil-redesignet (#2000,
# PR #2037) fjernede "Effektprofil"-sektionen, FANGEDE dette job regressionen i
# race-physiology-preview.spec.js — men PR'en blev merget alligevel, fordi
# frontend-smoke ikke er et required check og auto-merge kun venter på required
# checks. Fixet i PR #2114; postmortem:
# .claude/learnings/2026-07-02-e2e-spec-rot-ci-gater-kun-core-smoke.md
#
# Derfor: intet `paths:`-filter på workflow-niveau. Path-filteret ligger i
# `changes`-jobbet, så frontend-smoke ALTID rapporterer en konklusion (skipped
# tæller som grøn for branch protection) og dermed kan gøres til required
# check. Et workflow-niveau paths-filter ville efterlade et required check som
# "Expected" for evigt på docs-/backend-PR'er og blokere merge.

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Letvægts-path-filter (~10s ubuntu-job) i stedet for workflow-niveau `paths:`
  # — se kommentaren øverst. Matcher det gamle filter: frontend/** + denne fil.
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Detect frontend changes
        id: filter
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          FILES=$(gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER/files?per_page=100" --paginate --jq '.[].filename')
          # Ikke `grep -q`: tidlig exit + pipefail kan SIGPIPE printf og vende
          # svaret til falsk "ingen frontend-ændringer". >/dev/null læser alt.
          if printf '%s\n' "$FILES" | grep -E '^(frontend/|\.github/workflows/playwright-smoke\.yml$)' > /dev/null; then
            echo "frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "frontend=false" >> "$GITHUB_OUTPUT"
          fi

  frontend-smoke:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == 'true'
    runs-on: windows-latest
    permissions:
      contents: read
      pull-requests: write # fejl-kommentar på PR'en (rød suite må ikke være stille)
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      # #1342: CI kører kun chromium-projekterne (desktop + mobile). mobile-webkit
      # hænger systematisk på windows-latest og er droppet i CI (se playwright.config.js).
      - name: Install Playwright browsers
        run: npx playwright install chromium

      # #1342: byg frontend FØR Playwright, så webServer-kommandoen i CI kun er
      # `vite preview` (én proces). `npm run build && npm run preview` i én
      # webServer-kommando efterlod en forældreløs preview-proces på
      # windows-runneren som Playwright ikke kunne dræbe → jobbet hang 48 min.
      # VITE_E2E + VITE_-vars bages ind her på build-tid (preview serverer
      # statisk dist og læser dem ikke). Port 4173 = MAIN_PORT (se playwright.ports.js).
      - name: Build frontend (e2e)
        run: npm run build
        env:
          VITE_E2E: "1"
          VITE_API_URL: http://127.0.0.1:4173
          VITE_SUPABASE_URL: https://cycling-zone-e2e.supabase.co
          VITE_SUPABASE_ANON_KEY: e2e-anon-key
          VITE_PUBLIC_APP_URL: http://127.0.0.1:4173

      # timeout-minutes: backstop så et fremtidigt teardown-hæng aldrig igen kan
      # æde en 6-timers runner (#1342: et webkit-hæng kørte 48 min før cancel).
      # Et grønt chromium-only run er ~3-4 min, så 15 min er rigelig hovedplads.
      - name: Run Playwright smoke
        timeout-minutes: 15
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      # Rød suite skal være synlig i PR-samtalen (også på mobil, hvor
      # checks-boksen let overses — #2037 blev merget med rød frontend-smoke).
      # continue-on-error: fork-PR'er har read-only token; kommentaren er
      # best-effort og må aldrig maskere selve test-resultatet.
      - name: Comment on PR on failure
        if: failure() && github.event_name == 'pull_request'
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" --body "❌ **frontend-smoke fejlede** — den fulde Playwright-suite fandt regressioner. [Se run + playwright-report-artifact]($RUN_URL).

          Rød e2e må ikke merges stille (#2000-spec-rot → PR #2114): fix koden eller opdatér spec'en i samme PR. Auto-merge venter nu eksplicit på dette check."
