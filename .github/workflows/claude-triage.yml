name: Auto issue triage

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write
  id-token: write

jobs:
  triage:
    runs-on: ubuntu-latest
    # Skip issues oprettet af claude[bot] (undgå rekursive triage-loops)
    if: github.event.issue.user.login != 'claude[bot]'
    steps:
      - uses: actions/checkout@v6

      - name: Apply deterministic labels first
        id: labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          TITLE=$(jq -r '.issue.title // ""' "$GITHUB_EVENT_PATH")
          BODY=$(jq -r '.issue.body // ""' "$GITHUB_EVENT_PATH")
          EXISTING=$(jq -r '.issue.labels[].name' "$GITHUB_EVENT_PATH" | tr '\n' ' ')

          has_label() { echo " $EXISTING " | grep -q " $1 "; }
          add_label() {
            if ! has_label "$1"; then
              gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" --add-label "$1"
            fi
          }

          lower="$(printf '%s\n%s' "$TITLE" "$BODY" | tr '[:upper:]' '[:lower:]')"

          if echo "$lower" | grep -q 'priority:high\|data-tab\|blocker\|crash\|security\|sikkerhed\|500\|prod broken'; then
            priority="priority:high"
          elif echo "$lower" | grep -q 'priority:low\|kosmetisk\|nice to have\|post-launch'; then
            priority="priority:low"
          else
            priority="priority:med"
          fi

          if echo "$lower" | grep -q 'type:bug\|\[bug\]\|\[fix\]\|fejl\|regression'; then
            type="type:bug"
          elif echo "$lower" | grep -q 'type:docs\|\[docs\]\|dokumentation'; then
            type="type:docs"
          elif echo "$lower" | grep -q 'type:refactor\|\[refactor\]\|\[chore\]\|cleanup'; then
            type="type:refactor"
          elif echo "$lower" | grep -q 'type:investigation\|\[investigate\]\|\[audit\]\|undersøg\|undersog'; then
            type="type:investigation"
          else
            type="type:feature"
          fi

          has_label "claude:todo" || add_label "claude:todo"
          echo "$EXISTING" | grep -q 'priority:' || add_label "$priority"
          echo "$EXISTING" | grep -q 'type:' || add_label "$type"

          needs_ai=false
          if [ "$priority" = "priority:high" ] || [ "$type" = "type:investigation" ]; then
            add_label "needs-ai-triage"
            needs_ai=true
          fi

          echo "needs_ai=$needs_ai" >> "$GITHUB_OUTPUT"

      - id: claude_triage
        if: steps.labels.outputs.needs_ai == 'true'
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Lav en kort første-pass triage på dette issue.
            Deterministiske labels er allerede sat; ændr dem kun hvis de er åbenlyst forkerte.
            Output: maks 6 linjer som issue-comment:
            - sandsynligt startområde
            - 1-2 runtime-filer at grep'e
            - eventuelle blocker-spørgsmål

            Ingen kodeændringer og ingen brede audits.
          claude_args: |
            --max-turns 8
            --model claude-sonnet-4-6
            --allowed-tools Bash(gh issue *),Read,Glob,Grep

      - name: Notify on failure
        if: steps.claude_triage.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "🤖 **Auto-triage fejlede** — [se log]($RUN_URL)

          Triage er **advisory** — issuet er stadig brugbart med default-labels fra template.
          Manuel handling: tilføj \`priority:*\` + \`type:*\` labels selv hvis nødvendigt."
