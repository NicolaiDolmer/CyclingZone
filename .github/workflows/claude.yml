name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write          # bumped fra read — bot skal kunne pushe branch
      pull-requests: write     # bumped fra read — bot skal kunne oprette PR
      issues: write            # bumped fra read — bot skal kunne kommentere ved fejl
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          additional_permissions: |
            actions: read
          prompt: |
            Følg instruktionerne i issue/kommentaren der triggede dig.

            SCOPE-DISCIPLIN (kritisk — fejlmønster fra run 25488982114):
            - Du må KUN redigere filer der er direkte relevante for issue-acceptkriterierne
            - Du må ALDRIG slette eller ændre filer som ikke nævnes i issue-body, selv hvis de virker urelaterede eller forældede
            - Hvis du er i tvivl om en fil hører til scope: lad være med at ændre den

            Implementeringsprocedure:
            1. Læs issue body + alle comments for kontekst (hold dig til relevante filer ved exploration)
            2. Implementer ændringerne (følg konventioner i CLAUDE.md + docs/CONVENTIONS.md)
            3. **Close-out-filer (samme commit som koden):**
               - `frontend/src/pages/PatchNotesPage.jsx`: ny version-entry hvis ændringen rammer brugerrettede UI/UX. Skip kun hvis ren DX/intern — note hvorfor i PR-body.
               - `.claude/learnings/<YYYY-MM-DD>-<kort-slug>.md`: oprettes hvis denne PR fixer en bug. Format: `# Bug` / `# Root cause` / `# Fix` / `# Læring`. Se `.claude/learnings/2026-05-07-auction-timezone-utc-vs-cet.md` som eksempel.
               - `docs/NOW.md`: tilføj en kort entry øverst i "Senest leveret" med dato + issue-ref + 1-3 sætninger om hvad der ændrede sig. Hvis filen overstiger 30 linjer efter din entry: arkivér den ældste entry til `docs/archive/NOW_HISTORIK_<YYYY-MM-DD>.md` (opret eller append).
               - `docs/FEATURE_STATUS.md`: opdatér KUN hvis kontrakter, runtime-state eller features ændret.
            4. Commit + push branch (én commit med kode + close-out-filer er fint)
            5. **OBLIGATORISK NÆSTE HANDLING efter push:** kør `gh pr create --base main --head <branch> --title "<title>" --body "<body>"` med det samme. Lav INGEN yderligere fil-exploration eller cleanup mellem push og PR-creation — det er den sidste handling før du afslutter.

            PR-konvention (vigtigt):
            - Title: kort summary af ændringen + ` (#N)` suffix hvor N er issue-nummer
            - Body skal indeholde:
              - `## Summary` med 2-5 bullets
              - `Refs #N` (IKKE `Closes #N` — bruger lukker selv issues efter manuel verifikation; GitHub matcher `Close*` anywhere i body)
              - `## Patch notes`: notér hvilken version der blev tilføjet i PatchNotesPage.jsx, eller "DX-only / intern" hvis sprunget over.
              - `## Close-out`: bullet-liste over hvilke close-out-filer du opdaterede (NOW.md, FEATURE_STATUS.md, learnings). Hvis du sprang noget over: sig hvorfor.
              - `## Verifikation` med konkret test-procedure

            **AUTO-MERGE (ship-signal):** Efter `gh pr create` afsluttes med succes, parse trigger-eventet (issue/comment-body) for ship-keyword. Hvis brugeren skrev nogen af følgende — ` ship`, `--ship`, `send live`, `auto-merge`, `merge når grøn`, eller `merge naar groen` (case-insensitive, ord-grænser) — kør disse to kommandoer i rækkefølge på den nyoprettede PR:
            ```
            gh pr edit <PR-NUMBER> --repo NicolaiDolmer/CyclingZone --add-label "auto-merge"
            gh pr merge <PR-NUMBER> --repo NicolaiDolmer/CyclingZone --auto --squash --delete-branch
            ```
            Det første tilføjer en synlig label-marker. Det andet sætter PR i auto-merge-kø direkte (siden GITHUB_TOKEN-aktivitet i workflows ikke trigger andre workflows er det nødvendigt at kalde merge eksplicit). PR'en merger automatisk når `backend-tests` + `frontend-build` er grønne. Brugeren behøver IKKE klikke merge fra mobilen.

            Hvis ingen ship-keyword: gør INGENTING ekstra (default = manuel merge, det eksisterende safety-net for natlige autonome runs).

            Hvis du støder på blocker (mangler kontekst, fagligt valg, scope-uklarhed): comment på issuet med `claude:blocked` + spørgsmålet, og lav IKKE PR. Bedre at stoppe end at gætte.

            SCOPE-GUARD (kritisk — fejlmønster fra run 25699672154 / #260):
            Før du begynder at editere: lav en hurtig scope-vurdering af acceptkriteriet.
            - Hvis acceptkriteriet siger "audit alle steder X" / "i hele app'en" / "konsistent overalt", ELLER hvis din egen plan kræver edits i >8 filer: STOP.
            - Comment på issuet med `claude:blocked` + foreslå en split (fx scaffolding-issue + rollout-issue, eller én sub-issue per side/komponent), og lav IKKE PR.
            - Begrundelse: max-turns (120) dækker ~25-30 filer realistisk; større refactors fejler halvvejs og taber alt arbejde (ingen WIP-commit). Bedre at stoppe efter 5 turns end at brænde 50.
            - Undtagelse: trivielle find/replace på tværs af mange filer (fx import-rewrite) — det er stadig ét logisk edit og ok.
          claude_args: |
            --max-turns 120
            --model claude-sonnet-4-6
            --allowed-tools Bash(gh pr *),Bash(gh issue *),Bash(gh label *),Bash(gh api *),Bash(git *),Bash(npm *),Bash(node *),Bash(bash *),Bash(pwsh *),Edit,Read,Write,Glob,Grep

      - name: Notify on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue comment "$NUMBER" --body "🤖 **Automation-kørsel fejlede** — [se log]($RUN_URL)

          Mulige årsager: max-turns nået, permission-denial, eller transient fejl.
          Næste skridt: re-trigger med ny \`@claude\` comment, eller manuel håndtering."

