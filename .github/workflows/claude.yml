name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write          # bumped fra read ã bot skal kunne pushe branch
      pull-requests: write     # bumped fra read ã bot skal kunne oprette PR
      issues: write            # bumped fra read ã bot skal kunne kommentere ved fejl
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          additional_permissions: |
            actions: read
          prompt: |
            Fû¡lg instruktionerne i issue/kommentaren der triggede dig.

            SCOPE-DISCIPLIN (kritisk ã fejlmû¡nster fra run 25488982114):
            - Du mûË KUN redigere filer der er direkte relevante for issue-acceptkriterierne
            - Du mûË ALDRIG slette eller ûÎndre filer som ikke nûÎvnes i issue-body, selv hvis de virker urelaterede eller forûÎldede
            - Hvis du er i tvivl om en fil hû¡rer til scope: lad vûÎre med at ûÎndre den

            Implementeringsprocedure:
            1. LûÎs issue body + alle comments for kontekst (hold dig til relevante filer ved exploration)
            2. Implementer ûÎndringerne (fû¡lg konventioner i CLAUDE.md + docs/CONVENTIONS.md)
            3. **Close-out-filer (samme commit som koden):**
               - `frontend/src/pages/PatchNotesPage.jsx`: ny version-entry hvis ûÎndringen rammer brugerrettede UI/UX. Skip kun hvis ren DX/intern ã note hvorfor i PR-body.
               - `.claude/learnings/<YYYY-MM-DD>-<kort-slug>.md`: oprettes hvis denne PR fixer en bug. Format: `# Bug` / `# Root cause` / `# Fix` / `# LûÎring`. Se `.claude/learnings/2026-05-07-auction-timezone-utc-vs-cet.md` som eksempel.
               - `docs/NOW.md`: tilfû¡j en kort entry û¡verst i "Senest leveret" med dato + issue-ref + 1-3 sûÎtninger om hvad der ûÎndrede sig. Hvis filen overstiger 30 linjer efter din entry: arkivûˋr den ûÎldste entry til `docs/archive/NOW_HISTORIK_<YYYY-MM-DD>.md` (opret eller append).
               - `docs/FEATURE_STATUS.md`: opdatûˋr KUN hvis kontrakter, runtime-state eller features ûÎndret.
            4. Commit + push branch (ûˋn commit med kode + close-out-filer er fint)
            5. **OBLIGATORISK NûSTE HANDLING efter push:** kû¡r `gh pr create --base main --head <branch> --title "<title>" --body "<body>"` med det samme. Lav INGEN yderligere fil-exploration eller cleanup mellem push og PR-creation ã det er den sidste handling fû¡r du afslutter.

            PR-konvention (vigtigt):
            - Title: kort summary af ûÎndringen + ` (#N)` suffix hvor N er issue-nummer
            - Body skal indeholde:
              - `## Summary` med 2-5 bullets
              - `Refs #N` (IKKE `Closes #N` ã bruger lukker selv issues efter manuel verifikation; GitHub matcher `Close*` anywhere i body)
              - `## Patch notes`: notûˋr hvilken version der blev tilfû¡jet i PatchNotesPage.jsx, eller "DX-only / intern" hvis sprunget over.
              - `## Close-out`: bullet-liste over hvilke close-out-filer du opdaterede (NOW.md, FEATURE_STATUS.md, learnings). Hvis du sprang noget over: sig hvorfor.
              - `## Verifikation` med konkret test-procedure

            **AUTO-MERGE (ship-signal):** Efter `gh pr create` afsluttes med succes, parse trigger-eventet (issue/comment-body) for ship-keyword. Hvis brugeren skrev nogen af fû¡lgende ã ` ship`, `--ship`, `send live`, `auto-merge`, `merge nûËr grû¡n`, eller `merge naar groen` (case-insensitive, ord-grûÎnser) ã kû¡r disse to kommandoer i rûÎkkefû¡lge pûË den nyoprettede PR:
            ```
            gh pr edit <PR-NUMBER> --repo NicolaiDolmer/CyclingZone --add-label "auto-merge"
            gh pr merge <PR-NUMBER> --repo NicolaiDolmer/CyclingZone --auto --squash --delete-branch
            ```
            Det fû¡rste tilfû¡jer en synlig label-marker. Det andet sûÎtter PR i auto-merge-kû¡ direkte (siden GITHUB_TOKEN-aktivitet i workflows ikke trigger andre workflows er det nû¡dvendigt at kalde merge eksplicit). PR'en merger automatisk nûËr `backend-tests` + `frontend-build` er grû¡nne. Brugeren behû¡ver IKKE klikke merge fra mobilen.

            Hvis ingen ship-keyword: gû¡r INGENTING ekstra (default = manuel merge, det eksisterende safety-net for natlige autonome runs).

            Hvis du stû¡der pûË blocker (mangler kontekst, fagligt valg, scope-uklarhed): comment pûË issuet med `claude:blocked` + spû¡rgsmûËlet, og lav IKKE PR. Bedre at stoppe end at gûÎtte.
          claude_args: |
            --max-turns 50
            --model claude-sonnet-4-6
            --allowed-tools Bash(gh pr *),Bash(gh issue *),Bash(gh label *),Bash(gh api *),Bash(git *),Bash(npm *),Bash(node *),Bash(bash *),Bash(pwsh *),Edit,Read,Write,Glob,Grep

      - name: Notify on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue comment "$NUMBER" --body "ÞÊ **Automation-kû¡rsel fejlede** ã [se log]($RUN_URL)

          Mulige ûËrsager: max-turns nûËet, permission-denial, eller transient fejl.
          NûÎste skridt: re-trigger med ny \`@claude\` comment, eller manuel hûËndtering."

