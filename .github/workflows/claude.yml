name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write          # bumped fra read — bot skal kunne pushe branch
      pull-requests: write     # bumped fra read — bot skal kunne oprette PR
      issues: write            # bumped fra read — bot skal kunne kommentere ved fejl
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          additional_permissions: |
            actions: read
          prompt: |
            Følg instruktionerne i issue/kommentaren der triggede dig.

            SCOPE-DISCIPLIN (kritisk — fejlmønster fra run 25488982114):
            - Du må KUN redigere filer der er direkte relevante for issue-acceptkriterierne
            - Du må ALDRIG slette eller ændre filer som ikke nævnes i issue-body, selv hvis de virker urelaterede eller forældede
            - Hvis du er i tvivl om en fil hører til scope: lad være med at ændre den

            Implementeringsprocedure:
            1. Læs issue body + alle comments for kontekst (hold dig til relevante filer ved exploration)
            2. Implementer ændringerne (følg konventioner i CLAUDE.md + docs/CONVENTIONS.md)
            3. Commit + push branch
            4. **OBLIGATORISK NÆSTE HANDLING efter push:** kør `gh pr create --base main --head <branch> --title "<title>" --body "<body>"` med det samme. Lav INGEN yderligere fil-exploration eller cleanup mellem push og PR-creation — det er den sidste handling før du afslutter.

            PR-konvention (vigtigt):
            - Title: kort summary af ændringen + ` (#N)` suffix hvor N er issue-nummer
            - Body skal indeholde:
              - `## Summary` med 2-5 bullets
              - `Refs #N` (IKKE `Closes #N` — bruger lukker selv issues efter manuel verifikation; GitHub matcher `Close*` anywhere i body)
              - `## Patch notes`: hvis frontend UI/UX-ændring → `frontend/src/PatchNotesPage.jsx` skal opdateres med ny version i samme commit; ellers note "DX-only / intern" eksplicit
              - `## Verifikation` med konkret test-procedure

            Hvis du støder på blocker (mangler kontekst, fagligt valg, scope-uklarhed): comment på issuet med `claude:blocked` + spørgsmålet, og lav IKKE PR. Bedre at stoppe end at gætte.
          claude_args: |
            --max-turns 50
            --model claude-sonnet-4-6
            --allowed-tools Bash(gh pr *),Bash(gh issue *),Bash(gh label *),Bash(git *),Bash(npm *),Bash(node *),Bash(bash *),Bash(pwsh *),Edit,Read,Write,Glob,Grep

      - name: Notify on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue comment "$NUMBER" --body "🤖 **Automation-kørsel fejlede** — [se log]($RUN_URL)

          Mulige årsager: max-turns nået, permission-denial, eller transient fejl.
          Næste skridt: re-trigger med ny \`@claude\` comment, eller manuel håndtering."

