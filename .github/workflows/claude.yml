name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write          # bumped fra read — bot skal kunne pushe branch
      pull-requests: write     # bumped fra read — bot skal kunne oprette PR
      issues: write            # bumped fra read — bot skal kunne kommentere ved fejl
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          prompt: |
            Følg instruktionerne i den kommentar/issue der triggede dig.

            Implementeringsprocedure:
            1. Læs issue body + alle comments for kontekst
            2. Implementer ændringerne (følg konventioner i CLAUDE.md + docs/CONVENTIONS.md)
            3. Commit + push branch
            4. NÅR branch er pushed: kør `gh pr create --base main --head <branch> --title "<title>" --body "<body>"` for at oprette PR med det samme

            PR-konvention (vigtigt):
            - Title: kort summary af ændringen + ` (#N)` suffix hvor N er issue-nummer
            - Body indeholder:
              - `## Summary` med 2-5 bullets
              - `Refs #N` (IKKE `Closes #N` — brugeren lukker selv issues efter manuel verifikation)
              - `## Patch notes` sektion: hvis ændringen påvirker frontend UI/UX skal `frontend/src/PatchNotesPage.jsx` opdateres med ny version i samme commit; hvis DX-only/intern note det eksplicit
              - `## Verifikation` med konkret test-procedure

            Hvis du støder på blocker (fx mangler kontekst, fagligt valg påkrævet): lav IKKE PR, men comment på issuet med `claude:blocked` og spørgsmålet, så bruger kan svare næste gang.
          claude_args: |
            --max-turns 25
            --model claude-sonnet-4-6
            --allowed-tools Bash(gh pr *),Bash(gh issue *),Bash(gh label *),Bash(git *),Bash(npm *),Bash(node *),Bash(bash *),Bash(pwsh *),Edit,Read,Write,Glob,Grep

      - name: Notify on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue comment "$NUMBER" --body "🤖 **Automation-kørsel fejlede** — [se log]($RUN_URL)

          Mulige årsager: max-turns nået, permission-denial, eller transient fejl.
          Næste skridt: re-trigger med ny \`@claude\` comment, eller manuel håndtering."

