name: Dependabot advisory

# Advisory-only — INGEN automatisk merge. Workflow'en kommenterer på alle Dependabot-PRs
# med klassifikation (patch/minor/major) og overlader merge til brugeren via manuel
# `auto-merge`-label (auto-merge.yml håndterer label-trigget merge med samme CI-gates).
#
# Hvorfor advisory-only (skift 2026-05-08, #178 polish-sprint hærdning):
# Dependabot kan ikke længere ødelægge prod automatisk — selv ikke patch/minor med grøn CI.
# CI fanger ikke alt (runtime-regressioner, supply-chain-malice, transitive deps), så bruger
# skal eksplicit godkende hver merge. Frequent rebases lukkes også fordi vercel.json's
# ignoreCommand nu skipper Vercel preview-builds på dependabot/* branches.

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: dependabot-advisory-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  dependabot-advisory:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
          DEPENDENCY_NAMES: ${{ steps.metadata.outputs.dependency-names }}
        run: |
          if [[ "$UPDATE_TYPE" == "version-update:semver-major" ]]; then
            ICON="warning"
            CLASSIFICATION="**Major version-bump** for \`$DEPENDENCY_NAMES\`"
            RISK="Højrisiko — gennemgå breaking changes manuelt før merge."
          elif [[ "$UPDATE_TYPE" == "version-update:semver-minor" ]]; then
            ICON="information_source"
            CLASSIFICATION="**Minor version-bump** for \`$DEPENDENCY_NAMES\`"
            RISK="Lavrisiko per semver, men runtime-regressioner sker stadig. Verificer CI grøn."
          else
            ICON="bug"
            CLASSIFICATION="**Patch version-bump** for \`$DEPENDENCY_NAMES\`"
            RISK="Typisk lavrisiko (bugfixes). Verificer CI grøn."
          fi

          gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" --body ":${ICON}: ${CLASSIFICATION}

          ${RISK}

          **Auto-merge er deaktiveret for Dependabot pre-launch (#178).** Tilføj \`auto-merge\` label manuelt hvis du har verificeret CI er grøn og at bumpen er safe — så håndterer auto-merge.yml resten (synkron CI-wait → squash-merge → deploy-verify)."
