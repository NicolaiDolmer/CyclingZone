name: Dependabot auto-merge

# Auto-tilføjer 'auto-merge' label til lav-risiko Dependabot-PRs.
# Lav-risiko = patch eller minor update (ikke major version-bump).
# Major-bumps får ikke label → kræver manuel review.

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot-auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Vigtigt: GITHUB_TOKEN-aktivitet trigger ikke andre workflows (anti-loop-safeguard).
      # Derfor kalder vi BÅDE `gh pr edit --add-label` (UI-marker) OG `gh pr merge --auto`
      # direkte her, i stedet for at lade auto-merge.yml håndtere det via label-event.
      - name: Auto-label + queue auto-merge for safe updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch' || steps.metadata.outputs.update-type == 'version-update:semver-minor'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
        run: |
          gh pr edit "$PR_URL" --add-label "auto-merge"
          gh pr merge "$PR_NUMBER" --repo "${{ github.repository }}" --auto --squash --delete-branch
          gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" --body "🤖 **Dependabot $UPDATE_TYPE** klassificeret som lav-risiko → auto-merge i kø. Merger automatisk når CI grøn."

      - name: Note major bumps for manual review
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" --body "⚠️ **Major version-bump** — kræver manuel review af breaking changes før merge. Tilføj \`auto-merge\` label manuelt hvis du har verificeret ingen breaking impact."
