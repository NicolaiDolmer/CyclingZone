name: Claude task
description: Konkret opgave til Claude (bug-fix, feature, refactor)
title: "[task] "
labels: ["claude:todo"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Mål
      description: Hvad skal være anderledes når dette er færdigt? (én sætning)
      placeholder: "Brugere kan se gæld i Min aktivitet uden at scrolle"
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Kontekst & motivation
      description: Hvorfor nu? Hvilken bruger-/forretnings-smerte? Link til evt. tidligere issue/PR.
    validations:
      required: true
  - type: textarea
    id: files
    attributes:
      label: Filer / områder Claude bør kigge i
      description: Sti(er) eller komponenter. Lad være tomt hvis du ikke ved det — Claude finder selv.
      placeholder: "frontend/src/pages/MyActivityPage.jsx, backend/lib/loanEngine.js"
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptkriterier
      description: Punktliste — hvad skal være sandt før dette er done?
      value: |
        - [ ]
        - [ ]
    validations:
      required: true
  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of scope
      description: Hvad skal Claude IKKE røre? (modvirker scope-creep)
  - type: dropdown
    id: priority
    attributes:
      label: Prioritet
      options:
        - "priority:high"
        - "priority:med"
        - "priority:low"
      default: 1
    validations:
      required: true
