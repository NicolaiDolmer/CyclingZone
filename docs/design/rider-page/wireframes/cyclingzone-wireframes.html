document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Space Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"3cc94004-da2a-4dc1-b780-fcdf59e986c2\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"c69f7488-9955-48a4-b0b8-bd08e962b094\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-width:100%; min-height:100vh; width:max-content; box-sizing:border-box; padding:56px 64px; background:#e7e5df; font-family:'Space Mono', monospace;\">\n<div style=\"{{ varStyle }}\">\n\n  <!-- ===== TITLE / INTRO ===== -->\n  <div style=\"max-width:920px; margin-bottom:8px;\">\n    <div style=\"font:700 12px 'Space Mono'; letter-spacing:.22em; text-transform:uppercase; color:#9a9488;\">Wireframe-udforskning<\u002Fdiv>\n    <h1 style=\"font-family:'Caveat',cursive; font-weight:700; font-size:52px; line-height:1.0; margin:6px 0 10px; color:#2e2c28;\">CyclingZone — struktur før polish<\u002Fh1>\n    <p style=\"font-size:13px; line-height:1.7; color:#5a564e; max-width:780px; margin:0;\">Tre nøgle-skærme skitseret i lav opløsning. Hver skærm har 2 desktop-retninger at sammenligne + en mobil-version. Formålet er at flytte rundt på <b>indhold, hierarki og flow<\u002Fb> mens det stadig er gratis at ændre — ingen farver, fonte eller billeder at blive forelsket i endnu.<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- ===== LEGEND ===== -->\n  <div style=\"display:flex; flex-wrap:wrap; gap:28px; align-items:center; padding:16px 22px; background:#fff; border:var(--frame-border,2px solid #3f3f3f); border-radius:3px; box-shadow:0 1px 3px rgba(0,0,0,.08); margin:18px 0 44px; max-width:920px;\">\n    <div style=\"font:700 10px 'Space Mono'; letter-spacing:.14em; text-transform:uppercase; color:#3f3f3f;\">Sådan læses det ↓<\u002Fdiv>\n    <div style=\"display:flex; align-items:center; gap:9px;\">\n      <div style=\"width:34px; height:24px; border:1.5px solid #6b6b6b; background-image:linear-gradient(to top right,transparent calc(50% - 1px),#cfcfcf,transparent calc(50% + 1px)),linear-gradient(to bottom right,transparent calc(50% - 1px),#cfcfcf,transparent calc(50% + 1px));\"><\u002Fdiv>\n      <span style=\"font-size:11px; color:#5a564e;\">billede / foto<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex; align-items:center; gap:9px;\">\n      <div style=\"display:flex; flex-direction:column; gap:3px; width:40px;\"><div style=\"height:6px; border-radius:3px; background:#dcd7cc;\"><\u002Fdiv><div style=\"height:6px; width:70%; border-radius:3px; background:#dcd7cc;\"><\u002Fdiv><\u002Fdiv>\n      <span style=\"font-size:11px; color:#5a564e;\">tekst<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex; align-items:center; gap:9px;\">\n      <span style=\"display:inline-flex; border:1.5px solid #555; border-radius:6px; padding:4px 10px; font:400 10px 'Space Mono'; color:#444;\">knap<\u002Fspan>\n      <span style=\"font-size:11px; color:#5a564e;\">handling<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex; align-items:center; gap:9px;\">\n      <span style=\"font-family:'Caveat',cursive; font-size:20px; color:var(--ink,#2f6f9f); transform:rotate(var(--note-rotate,-1.5deg)); display:inline-block;\">begrundelse<\u002Fspan>\n      <span style=\"font-size:11px; color:#5a564e;\">designnote<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n\n  <!-- ============================================================= -->\n  <!-- SECTION 1 — DASHBOARD -->\n  <!-- ============================================================= -->\n  <div data-screen-label=\"Dashboard-sektion\" style=\"margin-bottom:64px;\">\n    <div style=\"display:flex; align-items:baseline; gap:14px; margin-bottom:6px;\">\n      <span style=\"font:700 11px 'Space Mono'; letter-spacing:.2em; color:#b3ada0;\">01<\u002Fspan>\n      <h2 style=\"font-family:'Caveat',cursive; font-weight:700; font-size:34px; margin:0; color:#2e2c28;\">Dashboard — managerens hjem<\u002Fh2>\n    <\u002Fdiv>\n    <p style=\"font-size:12px; color:#6a665e; margin:0 0 26px; max-width:680px;\">Første skærm efter login. Hvad skal en manager se først — næste handling, eller hele holdets tilstand?<\u002Fp>\n\n    <div style=\"display:flex; gap:64px; align-items:flex-start;\">\n\n      <!-- DASH A — desktop -->\n      <div style=\"flex:none; width:540px; position:relative;\">\n        <div style=\"display:flex; align-items:baseline; gap:10px; margin-bottom:10px;\">\n          <span style=\"font-family:'Caveat',cursive; font-weight:700; font-size:22px; color:#2e2c28;\">A · Handlingsfokus<\u002Fspan>\n          <span style=\"font:700 9px 'Space Mono'; letter-spacing:.1em; color:#fff; background:#8a857a; padding:2px 7px; border-radius:3px;\">DESKTOP<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border:var(--frame-border,2px solid #3f3f3f); border-radius:4px; box-shadow:0 2px 6px rgba(0,0,0,.1); overflow:hidden; display:flex; height:430px;\">\n          <!-- sidebar -->\n          <div style=\"flex:none; width:116px; background:#ddd9d0; border-right:1.5px solid #c7c1b4; padding:12px 10px; display:flex; flex-direction:column; gap:12px;\">\n            <div style=\"height:14px; width:74px; background:#3f3f3f; border-radius:2px;\"><\u002Fdiv>\n            <div style=\"padding:7px 8px; background:#fff; border:1px dashed #c7c1b4; border-radius:4px;\">\n              <div style=\"font:700 6px 'Space Mono'; letter-spacing:.1em; color:#9a9488;\">BALANCE<\u002Fdiv>\n              <div style=\"height:9px; width:60px; background:#cfc9bc; border-radius:2px; margin-top:4px;\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; gap:9px;\">\n              <div style=\"font:700 6px 'Space Mono'; color:#9a9488;\">KLUBHUS<\u002Fdiv>\n              <div style=\"height:5px; width:64px; background:#cdc7ba; border-radius:2px;\"><\u002Fdiv>\n              <div style=\"height:5px; width:52px; background:#cdc7ba; border-radius:2px;\"><\u002Fdiv>\n              <div style=\"height:5px; width:58px; background:#cdc7ba; border-radius:2px;\"><\u002Fdiv>\n              <div style=\"font:700 6px 'Space Mono'; color:#9a9488; margin-top:4px;\">MARKED<\u002Fdiv>\n              <div style=\"height:5px; width:50px; background:#cdc7ba; border-radius:2px;\"><\u002Fdiv>\n              <div style=\"height:5px; width:60px; background:#cdc7ba; border-radius:2px;\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <!-- main -->\n          <div style=\"flex:1; padding:14px 16px; display:flex; flex-direction:column; gap:12px; overflow:hidden;\">\n            <div style=\"display:flex; justify-content:space-between; align-items:center;\">\n              <div style=\"height:18px; width:160px; background:#3f3f3f; border-radius:3px;\"><\u002Fdiv>\n              <div style=\"height:12px; width:70px; background:#e0dccf; border-radius:6px;\"><\u002Fdiv>\n            <\u002Fdiv>\n            <!-- next actions hero -->\n            <div style=\"border:1.5px solid #6b6b6b; border-radius:6px; padding:12px;\">\n              <div style=\"height:9px; width:120px; background:#cfc9bc; border-radius:2px; margin-bottom:10px;\"><\u002Fdiv>\n              <div style=\"display:flex; flex-direction:column; gap:8px;\">\n                <div style=\"display:flex; align-items:center; gap:8px;\"><span style=\"width:8px;height:8px;border-radius:50%;background:#b8b2a6;\"><\u002Fspan><div style=\"height:7px; flex:1; background:#e6e1d5; border-radius:2px;\"><\u002Fdiv><span style=\"display:inline-flex;border:1.5px solid #555;border-radius:5px;padding:3px 9px;font:400 9px 'Space Mono';color:#444;\">Gå<\u002Fspan><\u002Fdiv>\n                <div style=\"display:flex; align-items:center; gap:8px;\"><span style=\"width:8px;height:8px;border-radius:50%;background:#b8b2a6;\"><\u002Fspan><div style=\"height:7px; flex:1; background:#e6e1d5; border-radius:2px;\"><\u002Fdiv><span style=\"display:inline-flex;border:1.5px solid #555;border-radius:5px;padding:3px 9px;font:400 9px 'Space Mono';color:#444;\">Gå<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <!-- kpi tiles -->\n            <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:8px;\">\n              <div style=\"border:1.5px solid #c7c1b4; border-radius:5px; padding:8px 6px;\"><div style=\"height:5px; width:70%; background:#dcd7cc; border-radius:2px;\"><\u002Fdiv><div style=\"height:13px; width:80%; background:#cfc9bc; border-radius:2px; margin-top:6px;\"><\u002Fdiv><\u002Fdiv>\n              <div style=\"border:1.5px solid #c7c1b4; border-radius:5px; padding:8px 6px;\"><div style=\"height:5px; width:70%; background:#dcd7cc; border-radius:2px;\"><\u002Fdiv><div style=\"height:13px; width:80%; background:#cfc9bc; border-radius:2px; margin-top:6px;\"><\u002Fdiv><\u002Fdiv>\n              <div style=\"border:1.5px solid #c7c1b4; border-radius:5px; padding:8px 6px;\"><div style=\"height:5px; width:70%; background:#dcd7cc; border-radius:2px;\"><\u002Fdiv><div style=\"height:13px; width:80%; background:#cfc9bc; border-radius:2px; margin-top:6px;\"><\u002Fdiv><\u002Fdiv>\n              <div style=\"border:1.5px solid #c7c1b4; border-radius:5px; padding:8px 6px;\"><div style=\"height:5px; width:70%; background:#dcd7cc; border-radius:2px;\"><\u002Fdiv><div style=\"height:13px; width:80%; background:#cfc9bc; border-radius:2px; margin-top:6px;\"><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <!-- two cols -->\n            <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:10px; flex:1;\">\n              <div style=\"border:1.5px solid #c7c1b4; border-radius:5px; padding:9px;\"><div style=\"height:7px; width:60%; background:#cfc9bc; border-radius:2px; margin-bottom:8px;\"><\u002Fdiv><div style=\"height:6px; width:90%; background:#e6e1d5; border-radius:2px; margin-bottom:5px;\"><\u002Fdiv><div style=\"height:6px; width:80%; background:#e6e1d5; border-radius:2px; margin-bottom:5px;\"><\u002Fdiv><div style=\"height:6px; width:85%; background:#e6e1d5; border-radius:2px;\"><\u002Fdiv><\u002Fdiv>\n              <div style=\"border:1.5px solid #c7c1b4; border-radius:5px; padding:9px;\"><div style=\"height:7px; width:55%; background:#cfc9bc; border-radius:2px; margin-bottom:8px;\"><\u002Fdiv><div style=\"height:6px; width:88%; background:#e6e1d5; border-radius:2px; margin-bottom:5px;\"><\u002Fdiv><div style=\"height:6px; width:75%; background:#e6e1d5; border-radius:2px;\"><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font:400 11px 'Space Mono'; color:#6a665e; margin:10px 2px 0; line-height:1.6;\">“Næste handlinger” øverst — managere logger ind for at <i>gøre<\u002Fi> noget. KPI’er og detaljer er sekundære.<\u002Fp>\n        <!-- note -->\n        <div style=\"display:var(--note-display,flex); align-items:flex-start; gap:6px; position:absolute; top:64px; left:calc(100% + 10px); width:150px; transform:rotate(var(--note-rotate,-1.5deg));\">\n          <span style=\"color:var(--ink,#2f6f9f); font-family:'Caveat',cursive; font-weight:700; font-size:17px;\">←<\u002Fspan>\n          <span style=\"font-family:'Caveat',cursive; font-weight:600; font-size:17px; line-height:1.15; color:var(--ink,#2f6f9f);\">deadline-handlinger må ikke kunne overses<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- DASH B — desk
