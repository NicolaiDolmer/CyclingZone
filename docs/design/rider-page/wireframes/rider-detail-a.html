  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"db165825-e195-4389-80f1-767e1d5e00a3\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n<x-dc>\n<helmet>\n<style>/* ──────────────────────────────────────────────────────────────────────────\n   Cycling Zone · Color tokens\n   Locked palette (BRAND_BRIEF §5 + Phase-4 token migration):\n     Navy #0e0f15 · Gold #e8c547 · Chalk #f4f2ec\n   Light (\"Chalk\") is the default; [data-theme=\"dark\"] flips to the navy canvas.\n   Accent colors are stored as space-separated RGB channels so consumers can do\n   rgb(var(--accent) / <alpha>) — matching the production Tailwind setup.\n   ────────────────────────────────────────────────────────────────────────── */\n\n:root {\n  color-scheme: light;\n\n  /* ── Brand constants (theme-independent reference values) ── */\n  --brand-navy:        #0e0f15;  /* P1 locked dark canvas / foreground */\n  --brand-navy-2:      #1a1f38;  /* sidebar / on-accent text */\n  --brand-gold:        #e8c547;  /* primary accent — \"yellow jersey = winner\" */\n  --brand-gold-bright: #ffd966;  /* dark-mode accent variant / twin-lines */\n  --brand-gold-deep:   #a07800;  /* WCAG-safe gold foreground on light canvas */\n  --brand-chalk:       #f4f2ec;  /* P2 locked light canvas */\n  --brand-white:       #ffffff;\n  --brand-black:       #0a0a0f;  /* near-black w/ a hint of navy */\n\n  /* ── Surfaces — Chalk ladder: canvas → card → elevated ── */\n  --bg-body:     #f4f2ec;   /* Chalk canvas */\n  --bg-card:     #fcfbf7;   /* card */\n  --bg-elevated: #ffffff;   /* modals / popovers / raised */\n  --bg-subtle:   #ece9e1;   /* recessed inset / hover (tracks, nested panels) */\n  --border:      #e5e0d5;\n\n  /* ── Text ── */\n  --text-1: #0e0f15;   /* primary (navy) */\n  --text-2: #66637a;   /* secondary */\n  --text-3: #9896b0;   /* tertiary / muted */\n\n  /* ── Accent (RGB channels for alpha support) ── */\n  --accent:    232 197 71;   /* @kind color */  /* #e8c547 brand gold */\n  --accent-t:  160 120 0;    /* @kind color */  /* #a07800 deep-gold foreground */\n  --on-accent: #1a1f38;      /* navy text on a gold fill */\n\n  /* ── \"You\" marker — neutral navy, never gold (gold = the leader) ── */\n  --me-ring:     26 31 56;     /* @kind color */\n  --me-badge-bg: 26 31 56;     /* @kind color */\n  --me-badge-fg: 244 242 236;  /* @kind color */\n\n  /* ── Sidebar — always dark navy (option A), identical in both themes ── */\n  --bg-sidebar:       #1a1f38;\n  --bg-sidebar-hover: rgba(255, 255, 255, 0.06);\n  --border-sidebar:   rgba(255, 255, 255, 0.07);\n  --text-sidebar-1:   #ffffff;\n  --text-sidebar-2:   rgba(255, 255, 255, 0.55);\n  --text-sidebar-3:   rgba(255, 255, 255, 0.25);\n\n  /* ── Semantic states (D-SEM Set 2 — warning shifted off brand gold) ── */\n  --success:    21 119 47;    /* @kind color */  /* #15772f */\n  --success-bg: #dcfce7;\n  --danger:     168 30 30;     /* @kind color */  /* #a81e1e */\n  --danger-bg:  #fee2e2;\n  --warning:    154 91 0;      /* @kind color */  /* #9a5b00 */\n  --warning-bg: #fef3c7;\n  --info:       26 71 192;     /* @kind color */  /* #1a47c0 */\n  --info-bg:    #dbeafe;\n\n  /* ── Division accents (standings) ── */\n  --div-1: #e8c547;  /* gold */\n  --div-2: #60a5fa;  /* blue */\n  --div-3: #a78bfa;  /* violet */\n\n  /* ── External brand — Discord Blurple (CTA only) ── */\n  --discord:       88 101 242;   /* @kind color */  /* #5865F2 */\n  --discord-hover: 71 82 196;    /* @kind color */  /* #4752c4 */\n\n  /* ── Categorical chart palette (RGB triplets, theme-agnostic) ── */\n  --cz-chart-1:  96 165 250;  /* @kind color */\n  --cz-chart-2: 167 139 250;  /* @kind color */\n  --cz-chart-3:  52 211 153;  /* @kind color */\n  --cz-chart-4: 251 191  36;  /* @kind color */\n  --cz-chart-5: 248 113 113;  /* @kind color */\n  --cz-chart-6:  34 211 238;  /* @kind color */\n  --cz-chart-7: 244 114 182;  /* @kind color */\n  --cz-chart-8: 250 204  21;  /* @kind color */\n  --cz-chart-9: 148 163 184;  /* @kind color */\n}\n\n[data-theme=\"dark\"] {\n  color-scheme: dark;\n\n  --bg-body:     #0e0f15;   /* locked navy canvas (P1) */\n  --bg-card:     #161824;   /* card */\n  --bg-elevated: #1f2233;   /* elevated */\n  --bg-subtle:   #14161e;   /* recessed inset / hover */\n  --border:      #2a2d3a;\n\n  --text-1: #ededf2;\n  --text-2: #9da0b3;\n  --text-3: #888ba0;   /* AA-fixed muted */\n\n  --accent:    232 197 71;    /* @kind color */\n  --accent-t:  255 217 102;   /* @kind color */  /* bright gold on navy */\n  --on-accent: #1a1f38;\n\n  --me-ring:     237 237 242;  /* @kind color */\n  --me-badge-bg: 237 237 242;  /* @kind color */\n  --me-badge-fg: 14 15 21;     /* @kind color */\n\n  /* Sidebar identical in both themes (option A) */\n\n  --success:    95 217 138;   /* @kind color */  /* #5fd98a */\n  --success-bg: rgba(95, 217, 138, 0.12);\n  --danger:     251 132 132;  /* @kind color */  /* #fb8484 */\n  --danger-bg:  rgba(251, 132, 132, 0.12);\n  --warning:    240 168 48;   /* @kind color */  /* #f0a830 */\n  --warning-bg: rgba(240, 168, 48, 0.12);\n  --info:       122 176 251;  /* @kind color */  /* #7ab0fb */\n  --info-bg:    rgba(122, 176, 251, 0.12);\n}\n<\u002Fstyle>\n<style>/* ──────────────────────────────────────────────────────────────────────────\n   Cycling Zone · Spacing, radii, shadow, motion & z-index tokens\n   Restraint is the brand (BRAND_BRIEF §3): small radii, hairline borders, a\n   single overlay shadow. No glow, no decorative gradients.\n   ────────────────────────────────────────────────────────────────────────── */\n\n:root {\n  /* ── Spacing scale (4px base) ── */\n  --space-0:  0px;\n  --space-1:  4px;\n  --space-2:  8px;\n  --space-3:  12px;\n  --space-4:  16px;\n  --space-5:  20px;\n  --space-6:  24px;\n  --space-8:  32px;\n  --space-10: 40px;\n  --space-12: 48px;\n  --space-16: 64px;\n  --space-20: 80px;\n\n  /* ── Radii — deliberately tight (fundament #671) ── */\n  --radius-none: 0px;\n  --radius-sm:   5px;    /* the workhorse: buttons, inputs, cards, chips */\n  --radius-md:   8px;    /* nav items, larger cards */\n  --radius-lg:   12px;   /* app data tables / panels */\n  --radius-pill: 9999px; /* badges, marketing chips */\n\n  /* ── Borders ── */\n  --border-width: 1px;     /* hairline is the default */\n  --border-width-accent: 2px; /* the gold top-rule on section headers */\n\n  /* ── Motion — short, precise, eased. No bounce. ── */\n  --dur-fast: 120ms;  /* @kind other */\n  --dur:      150ms;  /* @kind other */\n  --dur-slow: 240ms;  /* @kind other */\n  --ease: cubic-bezier(.2, .7, .2, 1);  /* @kind other */\n\n  /* ── Shadow — one overlay shadow only (modals / popovers). ── */\n  --shadow-overlay: 0 12px 28px -10px rgba(14, 15, 21, .18);\n\n  /* ── Z-index ladder ── */\n  --z-base: 0;          /* @kind other */\n  --z-dropdown: 1000;   /* @kind other */\n  --z-sticky: 1100;     /* @kind other */\n  --z-overlay: 1200;    /* @kind other */\n  --z-modal: 1300;      /* @kind other */\n  --z-toast: 1400;      /* @kind other */\n\n  /* ── Layout ── */\n  --sidebar-width: 208px;   /* w-52 */\n  --content-max: 1152px;    /* max-w-6xl readable column */\n  --content-max-wide: 1600px;\n}\n\n[data-theme=\"dark\"] {\n  /* Deeper overlay shadow on the navy canvas */\n  --shadow-overlay: 0 12px 30px -8px rgba(0, 0, 0, .6);\n}\n<\u002Fstyle>\n<style>/* ──────────────────────────────────────────────────────────────────────────\n   Cycling Zone · Typography tokens + self-hosted brand fonts\n   Three-role hybrid (locked #481 Phase 4):\n     • Bebas Neue   — display wordmark / headlines (super-condensed)\n     • Inter Tight  — data / UI workhorse (font-mono → data), tabular numerics\n     • DM Sans      — body / prose\n   ────────────────────────────────────────────────────────────────────────── */\n\n/* Bebas Neue — display. */\n@font-face {\n  font-family: 'Bebas Neue';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"5c998efa-6d03-4926-949c-8d2c92a9ac26\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n@font-face {\n  font-family: 'Bebas Neue';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"70251b69-e370-488c-8d5f-67cbef5f72fa\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n\n/* Inter Tight (variable wght 100–900) — data / UI font. */\n@font-face {\n  font-family: 'Inter Tight';\n  font-style: normal;\n  font-weight: 100 900;\n  font-display: swap;\n  src: url(\"45b8a27d-b0ee-4b7e-8d33-2baae2ca063e\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n@font-face {\n  font-family: 'Inter Tight';\n  font-style: normal;\n  font-weight: 100 900;\n  font-display: swap;\n  src: url(\"7021b9e5-1fa6-4116-8075-5d8c42640faf\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n\n/* DM Sans — body / prose (loaded from Google Fonts in the live app; bring your\n   own <link> in standalone pages, or it falls back to the system stack below). */\n\n:root {\n  /* Families — each carries its real production fallback stack. */\n  --font-display: 'Bebas Neue', 'Impact', 'Arial Narrow', sans-serif;\n  --font-data:    'Inter Tight', 'Inter Tight Fallback', system-ui, sans-serif;\n  --font-body:    'DM Sans', system-ui, -apple-system, sans-serif;\n\n  /* Type scale — app data UI runs tight (12–20px); display headlines scale big.\n     Body/prose uses --font-body; data/labels use --font-data; headlines display. */\n  --text-2xs: 10px;   /* category tags, sidebar eyebrows */\n  --text-xs:  12px;   /* labels, table meta, captions */\n  --text-sm:  14px;   /* body default in the app */\n  --text-md:  15px;   /* large body / marketing lede */\n  --text-lg:  18px;   /* card headings */\n  --text-xl:  20px;   /* page titles (app) */\n  --text-2xl: 24px;   /* section display */\n  --text-3xl: 30px;   /* KPI numerals */\n  --text-4xl: 36px;\n  --text-5xl: 48px;\n  --text-6xl: 60px;\n  --text-7xl: 72px;   /* marketing hero (Bebas) */\n\n  /* Weights — Inter Tight is variable; DM Sans 400/500/600/700. */\n  --weight-regular:  400;  /* @kind font */\n  --weight-medium:   500;  /* @kind font */\n  --weight-semibold: 600;  /* @kind font */\n  --weight-bold:     700;  /* @kind font */\n  --weight-black:    900;  /* @kind font */\n\n  /* Letter-spacing — the brand leans on uppercase eyebrows w/ wide tracking. */\n  --tracking-tight:  -0.02em;  /* @kind font */\n  --tracking-normal: 0;        /* @kind font */\n  --tracking-wide:   0.08em;   /* @kind font */\n  --tracking-eyebrow: 0.16em;  /* @kind font */\n  --tracking-kicker:  0.22em;  /* @kind font */\n\n  /* Line-heights */\n  --leading-display: 0.92;   /* @kind font */\n  --leading-snug:    1.2;    /* @kind font */\n  --leading-normal:  1.5;    /* @kind font */\n  --leading-relaxed: 1.65;   /* @kind font */\n}\n<\u002Fstyle>\n<style>/* ──────────────────────────────────────────────────────────────────────────\n   Cycling Zone · Global base\n   Body defaults, keyboard focus ring, and the brand motion keyframes\n   (skeleton shimmer, overlay reveals, price pulse). All respect\n   prefers-reduced-motion (a hard requirement in the source system).\n   ────────────────────────────────────────────────────────────────────────── */\n\n* { box-sizing: border-box; }\n\nbody {\n  margin: 0;\n  background: var(--bg-body);\n  color: var(--text-1);\n  font-family: var(--font-body);\n  font-size: var(--text-sm);\n  line-height: var(--leading-normal);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* Metric-matched fallback for the data font (keeps the webfont swap CLS-free). */\n@font-face {\n  font-family: 'Inter Tight Fallback';\n  src: local('Arial');\n  ascent-override: 87.37%;\n  descent-override: 21.76%;\n  line-gap-override: 0.00%;\n  size-adjust: 110.88%;\n}\n\n/* Data / numeric font helper — tabular figures keep number columns aligned. */\n.font-data,\n.font-mono {\n  font-family: var(--font-data);\n  font-variant-numeric: tabular-nums;\n}\n\n/* Keyboard-only focus ring (:focus-visible). Outline (not box-shadow) survives\n   high-contrast mode; accent-t is theme-aware (deep-gold light / bright dark). */\n:where(a, button, input, select, textarea, [tabindex=\"0\"], [role=\"button\"]):focus-visible {\n  outline: 2px solid rgb(var(--accent-t));\n  outline-offset: 1px;\n  border-radius: var(--radius-sm);\n}\n\n/* ── Price pulse-flash (gold) — live auction current-price change ── */\n@keyframes cz-pulse-flash {\n  0%   { background-color: rgb(var(--accent) / 0); }\n  20%  { background-color: rgb(var(--accent) / 0.45); }\n  100% { background-color: rgb(var(--accent) / 0); }\n}\n.cz-pulse-flash { animation: cz-pulse-flash 1.5s ease-out; border-radius: 4px; }\n\n/* ── Skeleton shimmer — discrete accent-t sweep, no glow ── */\n@keyframes cz-shimmer { 100% { transform: translateX(100%); } }\n@keyframes cz-spin { to { transform: rotate(360deg); } }\n\n/* ── Overlay reveals — discrete fade / pop / slide, no glow ── */\n@keyframes cz-overlay-fade { from { opacity: 0; } to { opacity: 1; } }\n@keyframes cz-overlay-pop  { from { opacity: 0; transform: translateY(4px) scale(.98); } to { opacity: 1; transform: translateY(0) scale(1); } }\n@keyframes cz-toast-in     { from { opacity: 0; transform: translateY(8px); } to {
