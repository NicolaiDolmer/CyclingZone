<!DOCTYPE html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cycling Zone</title>
    <meta name="description" content="Cycling Zone — fair, browser-based cycling manager MMO. Tactics, long-term planning and community rivalry. No pay-to-win, ever." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.ico" sizes="48x48" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="canonical" href="https://cycling-zone.vercel.app/" />

    <!-- OpenGraph / social-share. Tailored til Founder Supporter landing page (#361)
         da det er den primære public-facing route. Internal app-sider deler samme defaults. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Cycling Zone" />
    <meta property="og:url" content="https://cycling-zone.vercel.app/founder-supporter" />
    <meta property="og:title" content="Cycling Zone · Fair Cycling Manager" />
    <meta property="og:description" content="Build your cycling team. Race the world. Back a fair cycling manager. Premium will never buy stronger riders or competitive advantages." />
    <meta property="og:image" content="https://cycling-zone.vercel.app/og-cycling-zone.svg" />
    <meta property="og:image:type" content="image/svg+xml" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="da_DK" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Cycling Zone · Fair Cycling Manager" />
    <meta name="twitter:description" content="Build your cycling team. Race the world. Back a fair cycling manager. No pay-to-win." />
    <meta name="twitter:image" content="https://cycling-zone.vercel.app/og-cycling-zone.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,900;1,9..40,400&display=swap" rel="stylesheet" />
    <script>
      (function () {
        try {
          var pref = localStorage.getItem('cz-theme') || 'system';
          var isDark = pref === 'dark' ||
            (pref === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (isDark) document.documentElement.setAttribute('data-theme', 'dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
