<!DOCTYPE html>
<!-- #2039: EN-first default. Den autoritative app-bredte lang sættes runtime af
     LanguageProvider (document.documentElement.lang = aktivt UI-sprog). En statisk
     lang="da" på engelsk indhold fik browsere til at auto-oversætte → DOM-mutation
     → React-crash.
     #2253: bevidst INGEN global translate="no" her (ejer-beslutning, PR #2272):
     spillere skal kunne browser-oversætte statisk indhold til andre sprog end
     EN/DA. I stedet er translate="no" sat målrettet på de crash-følsomme
     dynamiske flader hvor Sentry viste NotFoundError-crashes (login, dashboard,
     profil, rytterprofil, standings, race-resultater). -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cycling Zone</title>
    <meta name="description" content="Cycling Zone: fair, browser-based cycling manager MMO. Tactics, long-term planning and community rivalry. No pay-to-win, ever." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.ico" sizes="48x48" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="canonical" href="https://cyclingzone.org/" />

    <!-- OpenGraph / social-share. Tailored til Founder Supporter landing page (#361)
         da det er den primære public-facing route. Internal app-sider deler samme defaults. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Cycling Zone" />
    <meta property="og:url" content="https://cyclingzone.org/founder-supporter" />
    <meta property="og:title" content="Cycling Zone · Fair Cycling Manager" />
    <meta property="og:description" content="Build your cycling team. Race the world. Back a fair cycling manager. Premium will never buy stronger riders or competitive advantages." />
    <!-- og:image MUST be a raster (PNG/JPG): Facebook, LinkedIn and X/Twitter do
         NOT render SVG og:image, so an SVG previews as broken/empty (#481-F5).
         Regenerate from the outlined master via `npm run brand:export:og`. -->
    <meta property="og:image" content="https://cyclingzone.org/og-cycling-zone.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Cycling Zone. Build your team. Race the world. A fair cycling manager MMO." />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="da_DK" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Cycling Zone · Fair Cycling Manager" />
    <meta name="twitter:description" content="Build your cycling team. Race the world. Back a fair cycling manager. No pay-to-win." />
    <meta name="twitter:image" content="https://cyclingzone.org/og-cycling-zone.png" />

    <!-- #1405: statisk JSON-LD @graph (Organization + WebSite). Ligger i den
         server-leverede index.html så også ikke-JS-crawlere ser den. VideoGame
         injiceres dynamisk kun på / via useJsonLd-hooket (frontend/src/hooks/
         useDocumentHead.js). -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://cyclingzone.org/#organization",
          "name": "Cycling Zone",
          "url": "https://cyclingzone.org",
          "logo": "https://cyclingzone.org/brand/icon-512.png",
          "sameAs": ["https://discord.gg/ykysBrWUyC"]
        },
        {
          "@type": "WebSite",
          "@id": "https://cyclingzone.org/#website",
          "name": "Cycling Zone",
          "url": "https://cyclingzone.org",
          "publisher": { "@id": "https://cyclingzone.org/#organization" }
        }
      ]
    }
    </script>

    <!-- #481 Phase 4 (PF1) + #1578 WP0: all brand fonts are self-hosted — no
         render-blocking Google Fonts <link> (DM Sans was the last one). @font-face
         lives in index.css with font-display:swap + metric-matched fallbacks.
         Preload the two above-the-fold latin subsets (DM Sans body + Inter Tight
         numbers) to shrink the swap window; latin-ext + Bebas lazy-load. -->
    <link rel="preload" href="/fonts/dm-sans-latin-wght-normal.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/inter-tight-latin-wght-normal.woff2" as="font" type="font/woff2" crossorigin />
    <script>
      (function () {
        try {
          var pref = localStorage.getItem('cz-theme') || 'system';
          var isDark = pref === 'dark' ||
            (pref === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (isDark) document.documentElement.setAttribute('data-theme', 'dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
